{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h3>📝 Avaliação do Supervisor</h3>
            <small class="text-muted">
                Avaliação referente à frequência mensal do estagiário.
            </small>
        </div>

        <button class="btn btn-secondary" onclick="voltar()">
            ← Voltar
        </button>

    </div>

    <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">
            Dados da Frequência
        </div>

        <div class="card-body">

            <input type="hidden" id="id">
            <input type="hidden" id="contrato_id">

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">
                        Contrato
                    </label>

                    <input
                        type="text"
                        id="numero_contrato"
                        class="form-control"
                        readonly
                    >
                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label fw-bold">
                        Estagiário
                    </label>

                    <input
                        type="text"
                        id="estagiario_nome"
                        class="form-control"
                        readonly
                    >

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label fw-bold">
                        Competência
                    </label>

                    <input
                        type="month"
                        id="competencia"
                        class="form-control"
                        readonly
                    >

                </div>

            </div>

            <hr>

            <h5 class="text-primary mb-3">

                Resultado da Avaliação

            </h5>

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Data da Avaliação
                    </label>

                    <input
                        type="date"
                        id="data_avaliacao"
                        class="form-control"
                    >

                </div>

                <div class="col-md-8 mb-3">

                    <label class="form-label">
                        Resultado
                    </label>

                    <select
                        id="avaliacao"
                        class="form-select"
                    >

                        <option value="">
                            Selecione...
                        </option>

                        <option value="INSUFICIENTE">
                            Insuficiente
                        </option>

                        <option value="SATISFATORIO">
                            Satisfatório
                        </option>

                        <option value="BOM">
                            Bom
                        </option>

                        <option value="PLENAMENTE_SATISFATORIO">
                            Plenamente Satisfatório
                        </option>

                    </select>

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Parecer do Supervisor
                </label>

                <textarea
                    id="parecer"
                    rows="6"
                    class="form-control"
                    placeholder="Informe seu parecer..."
                ></textarea>

            </div>

        </div>

        <div class="card-footer text-end">

            <button
                class="btn btn-success"
                onclick="salvar()"
            >
                Salvar Avaliação
            </button>

            <button
                class="btn btn-secondary"
                onclick="voltar()"
            >
                Cancelar
            </button>

        </div>

    </div>

</div>
