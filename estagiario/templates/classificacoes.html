{% extends "base.html" %}


{% block content %}


<div class="container mt-4">


    <div class="d-flex justify-content-between align-items-center mb-3">


        <h3>

            {% if classificacao %}
                Editar Classificação de Estágio
            {% else %}
                Nova Classificação de Estágio
            {% endif %}

        </h3>


        <a href="/estagiario/classificacoes/"
           class="btn btn-secondary">

            Voltar

        </a>


    </div>




    <div class="card shadow-sm">


        <div class="card-body">


            {% if classificacao %}

            <form method="post"
                  action="/estagiario/classificacoes/{{ classificacao.id }}/editar">

            {% else %}

            <form method="post"
                  action="/estagiario/classificacoes/novo">

            {% endif %}



                <!-- CÓDIGO -->


                <div class="mb-3">


                    <label class="form-label">

                        Código

                    </label>


                    <input type="text"
                           name="codigo"
                           class="form-control"
                           required
                           value="{{ classificacao.codigo if classificacao else '' }}">


                </div>




                <!-- DESCRIÇÃO -->


                <div class="mb-3">


                    <label class="form-label">

                        Descrição

                    </label>


                    <input type="text"
                           name="descricao"
                           class="form-control"
                           required
                           value="{{ classificacao.descricao if classificacao else '' }}">


                </div>





                {% if classificacao %}


                <!-- STATUS -->


                <div class="form-check mb-3">


                    <input class="form-check-input"
                           type="checkbox"
                           name="ativo"
                           id="ativo"
                           {% if classificacao.ativo %}
                           checked
                           {% endif %}>


                    <label class="form-check-label"
                           for="ativo">

                        Ativo

                    </label>


                </div>


                {% endif %}






                <div class="text-end">


                    <button type="submit"
                            class="btn btn-primary">


                        Salvar


                    </button>


                </div>




            </form>


        </div>


    </div>


</div>


{% endblock %}
