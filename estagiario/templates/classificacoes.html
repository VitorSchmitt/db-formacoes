{% extends "base.html" %}


{% block content %}


<div class="container mt-4">


    <!-- CABEÇALHO -->
    <div class="d-flex justify-content-between align-items-center mb-3">


        <div>
            <h3>
                Classificações de Estágio
            </h3>

            <small class="text-muted">
                Cadastro das modalidades de estágio
            </small>
        </div>


        <button 
            class="btn btn-primary"
            onclick="novo()">

            + Nova Classificação

        </button>


    </div>



    <!-- FORMULÁRIO -->

    <div class="card mb-4" id="formCard" style="display:none;">


        <div class="card-header">
            Cadastro
        </div>


        <div class="card-body">


            <input 
                type="hidden"
                id="id">


            <div class="row">


                <div class="col-md-8">


                    <label>
                        Descrição
                    </label>


                    <input 
                        type="text"
                        class="form-control"
                        id="descricao">


                </div>


                <div class="col-md-4">


                    <label>
                        Situação
                    </label>


                    <select 
                        class="form-control"
                        id="ativo">


                        <option value="true">
                            Ativo
                        </option>


                        <option value="false">
                            Inativo
                        </option>


                    </select>


                </div>


            </div>



            <div class="mt-3">


                <button 
                    class="btn btn-success"
                    onclick="salvar()">

                    Salvar

                </button>


                <button 
                    class="btn btn-secondary"
                    onclick="cancelar()">

                    Cancelar

                </button>


            </div>


        </div>


    </div>





    <!-- TABELA -->


    <div class="card">


        <div class="card-body">


            <table 
                class="table table-hover">


                <thead>

                    <tr>

                        <th>
                            Código
                        </th>


                        <th>
                            Descrição
                        </th>


                        <th>
                            Situação
                        </th>


                        <th>
                            Ações
                        </th>

                    </tr>


                </thead>


                <tbody id="lista">


                </tbody>


            </table>


        </div>


    </div>



</div>





<script>


const url = "/api/classificacoes-estagio";



document.addEventListener(
    "DOMContentLoaded",
    carregar
);



function carregar(){


    fetch(url)
    .then(r => r.json())
    .then(dados => {


        let html="";


        dados.forEach(item => {


            html += `

            <tr>


                <td>
                    ${item.id}
                </td>


                <td>
                    ${item.descricao}
                </td>


                <td>

                    ${
                    item.ativo
                    ?
                    '<span class="badge bg-success">Ativo</span>'
                    :
                    '<span class="badge bg-danger">Inativo</span>'
                    }

                </td>



                <td>


                    <button
                        class="btn btn-sm btn-warning"
                        onclick='editar(${JSON.stringify(item)})'>

                        Editar

                    </button>



                    <button
                        class="btn btn-sm btn-danger"
                        onclick="excluir(${item.id})">

                        Excluir

                    </button>


                </td>


            </tr>

            `;


        });



        document.getElementById("lista").innerHTML = html;


    });


}






function novo(){


    limpar();

    document
    .getElementById("formCard")
    .style.display="block";


}







function editar(item){


    document.getElementById("formCard")
    .style.display="block";


    document.getElementById("id")
    .value=item.id;


    document.getElementById("descricao")
    .value=item.descricao;


    document.getElementById("ativo")
    .value=item.ativo;


}








function salvar(){



    let id =
    document.getElementById("id").value;



    let dados = {


        descricao:
        document.getElementById("descricao").value,


        ativo:
        document.getElementById("ativo").value === "true"


    };



    let metodo =
    id ? "PUT" : "POST";



    let destino =
    id ? `${url}/${id}` : url;




    fetch(destino,{


        method: metodo,


        headers:{

            "Content-Type":
            "application/json"

        },


        body:
        JSON.stringify(dados)


    })

    .then(()=>{

        cancelar();

        carregar();

    });


}







function excluir(id){


    if(!confirm(
        "Deseja excluir esta classificação?"
    ))
    return;



    fetch(
        `${url}/${id}`,
        {
            method:"DELETE"
        }
    )

    .then(()=>carregar());


}







function cancelar(){


    limpar();


    document
    .getElementById("formCard")
    .style.display="none";


}







function limpar(){


    document.getElementById("id").value="";

    document.getElementById("descricao").value="";

    document.getElementById("ativo").value="true";


}



</script>



{% endblock %}
