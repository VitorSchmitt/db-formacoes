{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3>Contratos de Estágio</h3>
            <small class="text-muted">Controle de lotação, vigências e benefícios vinculados</small>
        </div>
        <button class="btn btn-primary" onclick="novo()">+ Novo Contrato</button>
    </div>

    <div class="card mb-4" id="formCard" style="display:none;">
        <div class="card-header" id="formHeader">Novo Contrato</div>
        <div class="card-body">
            <input type="hidden" id="id">
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Nº Contrato</label>
                    <input type="text" class="form-control" id="numero_contrato">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Estagiário</label>
                    <select class="form-control" id="estagiario_id"><option value="">Carregando...</option></select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Lotação</label>
                    <select class="form-control" id="lotacao_id"><option value="">Carregando...</option></select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Supervisor (Matrícula)</label>
                    <select class="form-control" id="supervisor_matricula"><option value="">Carregando...</option></select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Classificação</label>
                    <select class="form-control" id="classificacao_id"><option value="">Carregando...</option></select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Tabela de Benefícios (Vigência)</label>
                    <select class="form-control" id="beneficio_id"><option value="">Carregando...</option></select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Carga Horária Diária (h)</label>
                    <input type="number" class="form-control" id="carga_horaria_diaria">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Horário das Atividades</label>
                    <input type="text" class="form-control" id="horario" placeholder="Ex: 08:00 às 12:00">
                </div>
            </div>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Data de Assinatura</label>
                    <input type="date" class="form-control" id="data_assinatura">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Início das Atividades</label>
                    <input type="date" class="form-control" id="data_inicio">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Previsão de Término</label>
                    <input type="date" class="form-control" id="data_fim">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Observações Gerais</label>
                    <textarea class="form-control" id="observacoes" rows="1"></textarea>
                </div>
            </div>
            <div class="mt-2">
                <button class="btn btn-success" onclick="salvar()">Salvar Contrato</button>
                <button class="btn btn-secondary" onclick="cancelar()">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Nº Contrato</th>
                            <th>Estagiário</th>
                            <th>Lotação</th>
                            <th>Período</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const urlContratos = "/api/contratos";

document.addEventListener("DOMContentLoaded", () => {
    carregarSelects();
    carregarContratos();
});

function carregarSelects() {
    // Carrega dinamicamente as opções das chaves estrangeiras relacionais
    fetch("/api/estagiarios").then(r => r.json()).then(d => preencherSelect("estagiario_id", d, 'id', 'nome'));
    fetch("/api/lotacao").then(r => r.json()).then(d => preencherSelect("lotacao_id", d, 'id', 'descricao'));
    fetch("/api/servidores").then(r => r.json()).then(d => preencherSelect("supervisor_matricula", d, 'matricula', 'nome'));
    fetch("/api/classificacoes_estagio").then(r => r.json()).then(d => preencherSelect("classificacao_id", d.filter(c => c.ativo), 'id', 'descricao'));
    
    fetch("/api/beneficios_estagiario").then(r => r.json()).then(d => {
        let s = document.getElementById("beneficio_id");
        s.innerHTML = '<option value="">Selecione...</option>' + d.map(b => `<option value="${b.id}">Vigência: ${b.data_inicio_vigencia.split("-").reverse().join("/")} (VA: ${b.valor_vale_alimentacao} | VT: ${b.valor_vale_transporte})</option>`).join('');
    });
}

function preencherSelect(idElemento, dados, campoId, campoTexto) {
    let s = document.getElementById(idElemento);
    s.innerHTML = '<option value="">Selecione...</option>' + dados.map(item => `<option value="${item[campoId]}">${item[campoTexto]}</option>`).join('');
}

function carregarContratos() {
    fetch(urlContratos).then(r => r.json()).then(dados => {
        let html = "";
        dados.forEach(c => {
            const ini = c.data_inicio.split("-").reverse().join("/");
            const fim = c.data_fim.split("-").reverse().join("/");
            const statusBadge = c.data_desligamento 
                ? `<span class="badge bg-danger">Desligado (${c.data_desligamento.split("-").reverse().join("/")})</span>`
                : `<span class="badge bg-success">Ativo</span>`;

            html += `
                <tr>
                    <td><b>${c.numero_contrato}</b></td>
                    <td>${c.estagiario_nome}</td>
                    <td>${c.lotacao_descricao}</td>
                    <td><small>${ini} até ${fim}</small></td>
                    <td>${statusBadge}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick='editar(${JSON.stringify(c)})'>Editar</button>
                        ${!c.data_desligamento ? `<button class="btn btn-sm btn-danger" onclick="solicitarDesligamento(${c.id})">Desligar</button>` : ''}
                    </td>
                </tr>`;
        });
        document.getElementById("lista").innerHTML = html;
    });
}

function novo() { limpar(); document.getElementById("formCard").style.display = "block"; }
function cancelar() { limpar(); document.getElementById("formCard").style.display = "none"; }

function limpar() {
    document.getElementById("id").value = "";
    ["numero_contrato", "estagiario_id", "lotacao_id", "supervisor_matricula", "classificacao_id", "beneficio_id", "carga_horaria_diaria", "horario", "data_assinatura", "data_inicio", "data_fim", "observacoes"].forEach(id => {
        document.getElementById(id).value = "";
    });
}

function editar(c) {
    document.getElementById("formCard").style.display = "block";
    document.getElementById("id").value = c.id;
    ["numero_contrato", "estagiario_id", "lotacao_id", "supervisor_matricula", "classificacao_id", "beneficio_id", "carga_horaria_diaria", "horario", "data_assinatura", "data_inicio", "data_fim", "observacoes"].forEach(id => {
        document.getElementById(id).value = c[id] || "";
    });
}

// Envia dados coletados para criar ou atualizar
function salvar() {
    const id = document.getElementById("id").value;
    const dados = {
        numero_contrato: document.getElementById("numero_contrato").value,
        estagiario_id: parseInt(document.getElementById("estagiario_id").value),
        lotacao_id: parseInt(document.getElementById("lotacao_id").value),
        supervisor_matricula: document.getElementById("supervisor_matricula").value,
        classificacao_id: parseInt(document.getElementById("classificacao_id").value),
        beneficio_id: parseInt(document.getElementById("beneficio_id").value),
        carga_horaria_diaria: parseInt(document.getElementById("carga_horaria_diaria").value),
        horario: document.getElementById("horario").value,
        data_assinatura: document.getElementById("data_assinatura").value,
        data_inicio: document.getElementById("data_inicio").value,
        data_fim: document.getElementById("data_fim").value,
        observacoes: document.getElementById("observacoes").value
    };

    if(!dados.numero_contrato || !dados.estagiario_id || !dados.data_inicio || !dados.data_fim) {
        alert("Campos obrigatórios ausentes."); return;
    }

    const metodo = id ? "PUT" : "POST";
    const destino = id ? `${urlContratos}/${id}` : urlContratos;

    fetch(destino, {
        method: metodo,
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(dados)
    }).then(async r => {
        if(!r.ok) { const e = await r.json(); throw new Error(e.detail); }
        cancelar(); carregarContratos();
    }).catch(err => alert(err.message));
}

// Função rápida usando o Prompt Nativo do Navegador para Processo de Encerramento (Desligamento)
function solicitarDesligamento(id) {
    const data = prompt("Digite a data de desligamento (AAAA-MM-DD):");
    if(!data) return;
    const motivo = prompt("Motivo (Fim do Contrato / Rescisão pelo Estagiário / Rescisão pela Empresa / Outro):");
    if(!motivo) return;
    const obs = prompt("Observação (Opcional):");

    fetch(`${urlContratos}/${id}/desligar`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ data_desligamento: data, motivo_desligamento: motivo, observacao_desligamento: obs })
    }).then(async r => {
        if(!r.ok) { const e = await r.json(); throw new Error(e.detail); }
        carregarContratos();
    }).catch(err => alert(err.message));
}
</script>
{% endblock %}
