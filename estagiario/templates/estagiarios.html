{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3>Cadastro de Estagiários</h3>
            <small class="text-muted">Gerenciamento dos dados cadastrais dos estudantes</small>
        </div>
        <button class="btn btn-primary" onclick="novo()">
            + Novo Estagiário
        </button>
    </div>

    <div class="card mb-4" id="formCard" style="display:none;">
        <div class="card-header font-weight-bold">Ficha de Cadastro</div>
        <div class="card-body">
            
            <input type="hidden" id="id">

            <h5 class="text-primary mb-3">Dados Pessoais</h5>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Nome Completo *</label>
                    <input type="text" class="form-control" id="nome" required placeholder="Nome do estagiário">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">CPF *</label>
                    <input type="text" class="form-control" id="cpf" required placeholder="000.000.000-00">
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Sexo *</label>
                    <select class="form-control" id="sexo">
                        <option value="M">Masculino</option>
                        <option value="F">Feminino</option>
                        <option value="N" selected>Não Informado</option>
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control" id="data_nascimento">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" placeholder="nome@provedor.com">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Situação</label>
                    <select class="form-control" id="ativo">
                        <option value="true">Ativo</option>
                        <option value="false">Inativo</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Endereço Residencial</label>
                    <input type="text" class="form-control" id="endereco" placeholder="Rua, número, bairro, cidade...">
                </div>
            </div>

            <hr>

            <h5 class="text-primary mb-3">Formação Acadêmica</h5>
            <div class="row">
                <div class="col-md-5 mb-3">
                    <label class="form-label">Instituição de Ensino</label>
                    <input type="text" class="form-control" id="instituicao_ensino" placeholder="Ex: Universidade X">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Curso</label>
                    <input type="text" class="form-control" id="curso" placeholder="Ex: Administração">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Semestre / Ano</label>
                    <input type="text" class="form-control" id="semestre" placeholder="Ex: 4º Semestre">
                </div>
            </div>

            <hr>

            <h5 class="text-primary mb-3">Dados do Responsável</h5>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Nome do Responsável</label>
                    <input type="text" class="form-control" id="nome_responsavel" placeholder="Nome completo">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">CPF do Responsável</label>
                    <input type="text" class="form-control" id="cpf_responsavel" placeholder="000.000.000-00">
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Parentesco</label>
                    <input type="text" class="form-control" id="parentesco_responsavel" placeholder="Ex: Pai, Mãe">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Telefone Resp.</label>
                    <input type="text" class="form-control" id="telefone_responsavel" placeholder="(00) 00000-0000">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">E-mail do Responsável</label>
                    <input type="email" class="form-control" id="email_responsavel" placeholder="responsavel@email.com">
                </div>
            </div>

            <hr>

            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Observações Gerais</label>
                    <textarea class="form-control" id="observacoes" rows="2"></textarea>
                </div>
            </div>

            <div class="mt-2">
                <button class="btn btn-success" onclick="salvar()">Salvar</button>
                <button class="btn btn-secondary" onclick="cancelar()">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Curso / Instituição</th>
                        <th>Telefone</th>
                        <th>Situação</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista">
                    </tbody>
            </table>
        </div>
    </div>

</div>

<script>
const url = "/api/estagiarios";

document.addEventListener("DOMContentLoaded", carregar);

// 1. CARREGAR / LISTAR ESTAGIÁRIOS
function carregar() {
    fetch(url)
    .then(r => {
        if (!r.ok) throw new Error("Erro ao buscar estagiários.");
        return r.json();
    })
    .then(dados => {
        let html = "";
        dados.forEach(item => {
            const infoAcademica = item.curso ? `${item.curso} (${item.instituicao_ensino || 'N/I'})` : "Não Informado";
            
            html += `
            <tr>
                <td><strong>${item.nome}</strong></td>
                <td>${item.cpf}</td>
                <td><small>${infoAcademica}</small></td>
                <td>${item.telefone || '-'}</td>
                <td>
                    ${item.ativo 
                        ? '<span class="badge bg-success">Ativo</span>' 
                        : '<span class="badge bg-danger">Inativo</span>'
                    }
                </td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick='editar(${JSON.stringify(item)})'>
                        Editar
                    </button>                    
                </td>
            </tr>
            `;
        });
        document.getElementById("lista").innerHTML = html;
    })
    .catch(err => console.error("Erro:", err));
}

// 2. ABRIR FORMULÁRIO
function novo() {
    limpar();
    document.getElementById("formCard").style.display = "block";
}

// 3. EDITAR REGISTRO
function editar(item) {
    document.getElementById("formCard").style.display = "block";
    document.getElementById("id").value = item.id;
    document.getElementById("nome").value = item.nome;
    document.getElementById("sexo").value = item.sexo;
    document.getElementById("cpf").value = item.cpf;
    document.getElementById("data_nascimento").value = item.data_nascimento;
    document.getElementById("email").value = item.email;
    document.getElementById("telefone").value = item.telefone;
    document.getElementById("endereco").value = item.endereco;
    document.getElementById("instituicao_ensino").value = item.instituicao_ensino;
    document.getElementById("curso").value = item.curso;
    document.getElementById("semestre").value = item.semestre;
    document.getElementById("ativo").value = String(item.ativo);
    document.getElementById("observacoes").value = item.observacoes;
    
    // Dados do Responsável
    document.getElementById("nome_responsavel").value = item.nome_responsavel;
    document.getElementById("cpf_responsavel").value = item.cpf_responsavel;
    document.getElementById("parentesco_responsavel").value = item.parentesco_responsavel;
    document.getElementById("telefone_responsavel").value = item.telefone_responsavel;
    document.getElementById("email_responsavel").value = item.email_responsavel;
}

// 4. SALVAR (POST ou PUT)
function salvar() {
    const id = document.getElementById("id").value;

    // Captura os valores básicos do formulário
    let nomeResponsavel = document.getElementById("nome_responsavel").value.trim();
    let cpfResponsavel = document.getElementById("cpf_responsavel").value.trim();
    let parentescoResponsavel = document.getElementById("parentesco_responsavel").value.trim();
    let telefoneResponsavel = document.getElementById("telefone_responsavel").value.trim();
    let emailResponsavel = document.getElementById("email_responsavel").value.trim();

    // Regra: Se não houver nome do responsável, define tudo como "NÃO INFORMADO"
    if (!nomeResponsavel) {
        nomeResponsavel = "NÃO INFORMADO";
        cpfResponsavel = "NÃO INFORMADO";
        parentescoResponsavel = "NÃO INFORMADO";
        telefoneResponsavel = "NÃO INFORMADO";
        emailResponsavel = "NÃO INFORMADO";
    }

    const dados = {
        // .toUpperCase() garante que o texto vá em caixa alta para a API
        nome: document.getElementById("nome").value.trim().toUpperCase(),
        sexo: document.getElementById("sexo").value, // Enums costumam ficar em inglês/padrão do banco
        cpf: document.getElementById("cpf").value.trim(),
        data_nascimento: document.getElementById("data_nascimento").value || null,
        email: (document.getElementById("email").value.trim() || "NÃO INFORMADO").toUpperCase(),
        telefone: document.getElementById("telefone").value.trim() || null,
        endereco: (document.getElementById("endereco").value.trim() || "NÃO INFORMADO").toUpperCase(),
        instituicao_ensino: (document.getElementById("instituicao_ensino").value.trim() || "NÃO INFORMADO").toUpperCase(),
        curso: (document.getElementById("curso").value.trim() || "NÃO INFORMADO").toUpperCase(),
        semestre: (document.getElementById("semestre").value.trim() || "NÃO INFORMADO").toUpperCase(),
        ativo: document.getElementById("ativo").value === "true",
        observacoes: document.getElementById("observacoes").value.trim() ? document.getElementById("observacoes").value.trim().toUpperCase() : null,
        
        // Dados do responsável tratados
        nome_responsavel: nomeResponsavel.toUpperCase(),
        cpf_responsavel: cpfResponsavel.toUpperCase(),
        parentesco_responsavel: parentescoResponsavel.toUpperCase(),
        telefone_responsavel: telefoneResponsavel.toUpperCase(),
        email_responsavel: emailResponsavel.toUpperCase()
    };

    if (!dados.nome || !dados.cpf) {
        alert("Por favor, preencha os campos obrigatórios (Nome e CPF).");
        return;
    }

    const metodo = id ? "PUT" : "POST";
    const destino = id ? `${url}/${id}` : url;

    fetch(destino, {
        method: metodo,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dados)
    })
    .then(async response => {
        if (!response.ok) {
            const erroApi = await response.json();
            throw new Error(erroApi.detail || "Erro ao processar requisição.");
        }
        cancelar();
        carregar();
    })
    .catch(err => {
        alert("Erro ao salvar: " + err.message);
    });
}
// 4. SALVAR (POST ou PUT)
function salvar() {
    const id = document.getElementById("id").value;

    let nomeResponsavel = document.getElementById("nome_responsavel").value.trim();
    let cpfResponsavel = document.getElementById("cpf_responsavel").value.trim();
    let parentescoResponsavel = document.getElementById("parentesco_responsavel").value.trim();
    let telefoneResponsavel = document.getElementById("telefone_responsavel").value.trim();
    let emailResponsavel = document.getElementById("email_responsavel").value.trim();

    if (!nomeResponsavel) {
        nomeResponsavel = "NÃO INFORMADO";
        cpfResponsavel = "NÃO INFORMADO";
        parentescoResponsavel = "NÃO INFORMADO";
        telefoneResponsavel = "NÃO INFORMADO";
        emailResponsavel = "NÃO INFORMADO";
    }

    // Tratamento estrito para o campo data_nascimento
    const dataInput = document.getElementById("data_nascimento").value;
    const dataFormatada = dataInput && dataInput.trim() !== "" ? dataInput : null;

    const dados = {
        nome: document.getElementById("nome").value.trim().toUpperCase(),
        sexo: document.getElementById("sexo").value, 
        cpf: document.getElementById("cpf").value.trim(),
        data_nascimento: dataFormatada, // Evita enviar string vazia para o tipo date
        email: (document.getElementById("email").value.trim() || "NÃO INFORMADO").toUpperCase(),
        telefone: document.getElementById("telefone").value.trim() || null,
        endereco: (document.getElementById("endereco").value.trim() || "NÃO INFORMADO").toUpperCase(),
        instituicao_ensino: (document.getElementById("instituicao_ensino").value.trim() || "NÃO INFORMADO").toUpperCase(),
        curso: (document.getElementById("curso").value.trim() || "NÃO INFORMADO").toUpperCase(),
        semestre: (document.getElementById("semestre").value.trim() || "NÃO INFORMADO").toUpperCase(),
        ativo: document.getElementById("ativo").value === "true",
        observacoes: document.getElementById("observacoes").value.trim() ? document.getElementById("observacoes").value.trim().toUpperCase() : null,
        
        nome_responsavel: nomeResponsavel.toUpperCase(),
        cpf_responsavel: cpfResponsavel.toUpperCase(),
        parentesco_responsavel: parentescoResponsavel.toUpperCase(),
        telefone_responsavel: telefoneResponsavel.toUpperCase(),
        email_responsavel: emailResponsavel.toUpperCase()
    };

    if (!dados.nome || !dados.cpf) {
        alert("Por favor, preencha os campos obrigatórios (Nome e CPF).");
        return;
    }

    const metodo = id ? "PUT" : "POST";
    const destino = id ? `${url}/${id}` : url;

    fetch(destino, {
        method: metodo,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dados)
    })
    .then(async response => {
        if (!response.ok) {
            const erroApi = await response.json();
            // Se for erro 422, o FastAPI retorna os detalhes no objeto 'detail'
            if (response.status === 422) {
                console.error("Erro de Validação do FastAPI (422):", erroApi.detail);
                alert("Erro de validação nos campos: " + JSON.stringify(erroApi.detail));
            } else {
                throw new Error(erroApi.detail || "Erro ao processar requisição.");
            }
            return;
        }
        cancelar();
        carregar();
    })
    .catch(err => {
        alert("Erro ao salvar: " + err.message);
    });
}
// 5. CANCELAR
function cancelar() {
    limpar();
    document.getElementById("formCard").style.display = "none";
}

// 6. LIMPAR
function limpar() {
    document.getElementById("id").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("sexo").value = "N"; 
    document.getElementById("cpf").value = "";
    document.getElementById("data_nascimento").value = "";
    document.getElementById("email").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("endereco").value = "";
    document.getElementById("instituicao_ensino").value = "";
    document.getElementById("curso").value = "";
    document.getElementById("semestre").value = "";
    document.getElementById("ativo").value = "true";
    document.getElementById("observacoes").value = "";
    document.getElementById("nome_responsavel").value = "";
    document.getElementById("cpf_responsavel").value = "";
    document.getElementById("parentesco_responsavel").value = "";
    document.getElementById("telefone_responsavel").value = "";
    document.getElementById("email_responsavel").value = "";
}
</script>

{% endblock %}
