{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3>Frequências de Estágio</h3>
            <small class="text-muted">Gerenciamento da assiduidade e horas realizadas pelos estagiários</small>
        </div>
        <button class="btn btn-primary" onclick="novo()">
            + Lançar Frequência
        </button>
    </div>

    <div class="card mb-4" id="formCard" style="display:none;">
        <div class="card-header font-weight-bold" id="formTitulo">Lançar Nova Frequência</div>
        <div class="card-body">
            
            <input type="hidden" id="id">

            <h5 class="text-primary mb-3">Informações de Competência</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Contrato de Estágio *</label>
                    <select class="form-control" id="contrato_id" required>
                        <option value="">Selecione um contrato...</option>
                        </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Competência (Mês/Ano) *</label>
                    <input type="month" class="form-control" id="competencia" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Dias Úteis Trabalhados *</label>
                    <input type="number" class="form-control" id="dias" min="0" max="31" required placeholder="Ex: 22">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Horas Realizadas *</label>
                    <input type="number" step="0.01" class="form-control" id="horas_realizadas" required placeholder="Ex: 120.50">
                </div>
            </div>

            <hr>

            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Observações</label>
                    <textarea class="form-control" id="observacao" rows="3" placeholder="Ocorrências, justificativas ou notas gerais..."></textarea>
                </div>
            </div>

            <div class="mt-2">
                <button class="btn btn-success" onclick="salvar()">Salvar</button>
                <button class="btn btn-secondary" onclick="cancelar()">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="px-4">Nº Contrato</th>
                        <th>Competência</th>
                        <th>Dias Trabalhados</th>
                        <th>Horas Realizadas</th>
                        <th>Observação</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista">
                    </tbody>
            </table>
        </div>
    </div>

</div>

<script>
const url = "/api/frequencia_estagio";
const urlContratos = "/api/contrato_estagio";

document.addEventListener("DOMContentLoaded", () => {
    carregar();
    carregarContratos();
});

// 1. CARREGAR / LISTAR FREQUÊNCIAS
function carregar() {
    fetch(url)
    .then(r => {
        if (!r.ok) throw new Error("Erro ao buscar frequências.");
        return r.json();
    })
    .then(dados => {
        let html = "";
        if (dados.length === 0) {
            html = `<tr><td colspan="6" class="text-center text-muted py-4">Nenhuma frequência registrada.</td></tr>`;
        } else {
            dados.forEach(item => {
                html += `
                <tr>
                    <td class="px-4 text-primary"><strong>${item.numero_contrato}</strong></td>
                    <td>${item.competencia}</td>
                    <td>${item.dias} dias</td>
                    <td>${parseFloat(item.horas_realizadas).toFixed(2)}h</td>
                    <td class="text-muted fst-italic">${item.observacao || '-'}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-warning" onclick='editar(${JSON.stringify(item)})'>
                            Editar
                        </button>                     
                    </td>
                </tr>
                `;
            });
        }
        document.getElementById("lista").innerHTML = html;
    })
    .catch(err => console.error("Erro ao listar:", err));
}

// 2. CARREGAR SELECT DE CONTRATOS
function carregarContratos() {
    fetch(urlContratos)
    .then(r => r.json())
    .then(dados => {
        const select = document.getElementById("contrato_id");
        dados.forEach(c => {
            const option = document.createElement("option");
            option.value = c.id;
            option.textContent = `Contrato: ${c.numero_contrato} - ${c.estagiario_nome}`;
            select.appendChild(option);
        });
    })
    .catch(err => console.error("Erro ao carregar contratos:", err));
}

// 3. ABRIR FORMULÁRIO (NOVO)
function novo() {
    limpar();
    document.getElementById("formTitulo").innerText = "Lançar Nova Frequência";
    document.getElementById("contrato_id").disabled = false;
    document.getElementById("formCard").style.display = "block";
}

// 4. PREPARAR EDIÇÃO
function editar(item) {
    document.getElementById("formCard").style.display = "block";
    document.getElementById("formTitulo").innerText = "Editar Frequência";
    
    document.getElementById("id").value = item.id;
    document.getElementById("contrato_id").value = item.contrato_id;
    document.getElementById("contrato_id").disabled = true; // Impede alterar o contrato de uma frequência existente
    
    // Converte a competência "MM-YYYY" ou "MM/YYYY" para "YYYY-MM" aceito pelo input tipo month
    const partes = item.competencia.split(/[-/]/);
    if (partes.length === 2) {
        document.getElementById("competencia").value = `${partes[1]}-${partes[0]}`;
    }
    
    document.getElementById("dias").value = item.dias;
    document.getElementById("horas_realizadas").value = item.horas_realizadas;
    document.getElementById("observacao").value = item.observacao || "";
}


// 5. SALVAR (POST ou PUT)
function salvar() {
    const id = document.getElementById("id").value;
    const contratoId = document.getElementById("contrato_id").value;
    const compInput = document.getElementById("competencia").value; // Pode vir "YYYY-MM" ou "MM/YYYY"

    if (!contratoId || !compInput || !document.getElementById("dias").value || !document.getElementById("horas_realizadas").value) {
        alert("Por favor, preencha todos os campos obrigatórios (*).");
        return;
    }

    // Adaptação segura: Trata se vier invertido (MM/YYYY) ou normal (YYYY-MM)
    let dataFormatada = compInput;
    if (compInput.includes('/')) {
        const partes = compInput.split('/');
        dataFormatada = `${partes[1]}-${partes[0]}-01`; // Converte "06/2026" -> "2026-06-01"
    } else if (compInput.includes('-') && compInput.split('-')[0].length === 2) {
        const partes = compInput.split('-');
        dataFormatada = `${partes[1]}-${partes[0]}-01`; // Converte "06-2026" -> "2026-06-01"
    } else {
        dataFormatada = `${compInput}-01`; // Padrão original para "YYYY-MM" -> "YYYY-MM-01"
    }

    const dados = {
        contrato_id: parseInt(contratoId),
        competencia: dataFormatada,
        dias: parseInt(document.getElementById("dias").value),
        horas_realizadas: parseFloat(document.getElementById("horas_realizadas").value),
        observacao: document.getElementById("observacao").value.trim() ? document.getElementById("observacao").value.trim().toUpperCase() : null
    };

    const metodo = id ? "PUT" : "POST";
    const destino = id ? `${url}/${id}` : url;

    fetch(destino, {
        method: metodo,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dados)
    })
    .then(async response => {
        if (!response.ok) {
            const erroApi = await response.json();
            if (response.status === 422) {
                console.error("Erro de Validação (422):", erroApi.detail);
                alert("Erro de validação nos campos informados.");
            } else {
                throw new Error(erroApi.detail || "Erro ao processar requisição.");
            }
            return;
        }
        cancelar();
        carregar();
    })
    .catch(err => {
        alert("Erro ao salvar: " + err.message);
    });
}

// 6. CANCELAR
function cancelar() {
    limpar();
    document.getElementById("formCard").style.display = "none";
}

// 7. LIMPAR
function limpar() {
    document.getElementById("id").value = "";
    document.getElementById("contrato_id").value = "";
    document.getElementById("competencia").value = "";
    document.getElementById("dias").value = "";
    document.getElementById("horas_realizadas").value = "";
    document.getElementById("observacao").value = "";
}
</script>

{% endblock %}
