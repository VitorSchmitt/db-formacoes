{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3>Frequências de Estágio</h3>
            <small class="text-muted">
                Gerenciamento da assiduidade e horas realizadas pelos estagiários
            </small>
        </div>
        <button 
            class="btn btn-primary" 
            onclick="novo()">
            + Lançar Frequência
        </button>
    </div>
    <div class="card mb-4" id="formCard" style="display:none;">
        <div class="card-header" id="formTitulo">
            Lançar Nova Frequência
        </div>
        <div class="card-body">
            <input type="hidden" id="id">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Contrato de Estágio *
                    </label>
                    <select 
                        class="form-control" 
                        id="contrato_id">
                        <option value="">
                            Selecione o contrato...
                        </option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Competência *
                    </label>
                    <input 
                        type="month" 
                        class="form-control"
                        id="competencia">
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">
                        Dias Trabalhados *
                    </label>
                    <input
                        type="number"
                        class="form-control"
                        id="dias"
                        min="0"
                        max="31">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">
                        Horas Realizadas *
                    </label>
                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        id="horas_realizadas">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Observações
                </label>
                <textarea
                    class="form-control"
                    id="observacao"
                    rows="3"></textarea>
            </div>
            <button
                class="btn btn-success"
                onclick="salvar()">
                Salvar
            </button>
            <button
                class="btn btn-secondary"
                onclick="cancelar()">
                Cancelar
            </button>
        </div>
    </div>
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="px-4">
                            Nº Contrato
                        </th>
                        <th>
                            Competência
                        </th>
                        <th>
                            Dias
                        </th>
                        <th>
                            Horas
                        </th>
                        <th>
                            Observação
                        </th>
                        <th>
                            Avaliação
                        </th>
                        <th class="text-center">
                            Ações
                        </th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>
    </div>
</div>
<script>


const url = "/api/frequencia_estagio";

const urlContratos =
    "/api/contrato_estagio/meus";
document.addEventListener(
    "DOMContentLoaded",
    () => {
        carregar();
        carregarContratos();
    }
);

// ===============================
// LISTAR FREQUÊNCIAS
// ===============================

function carregar(){
    fetch(url)
    .then(r=>{
        if(!r.ok)
            throw new Error(
                "Erro ao buscar frequências."
            );
        return r.json();
    })
    .then(dados=>{
        let html="";
        if(dados.length===0){
            html =`
            <tr>
                <td colspan="7"
                    class="text-center text-muted">
                    Nenhuma frequência registrada.
                </td>
            </tr>
            `;
        }
        else{
            dados.forEach(item=>{
                let status = item.avaliada ? ` <span class="badge bg-success">✔ Avaliada</span> ` :  ` <span class="badge bg-warning text-dark"> ⏳ Pendente  </span>`;
                let botaoAvaliacao = item.avaliada ? 
                `<button
                    class="btn btn-sm btn-info"
                    onclick="abrirAvaliacao(${item.id})">
                    Editar Avaliação
                </button>` :
                `<button
                    class="btn btn-sm btn-success"
                    onclick="novaAvaliacao(${item.id})">
                    Avaliar
                </button> `;
                html += `
                <tr>
                    <td class="px-4">
                        <strong class="text-primary">
                            ${item.numero_contrato}
                        </strong>
                    </td>
                    <td>
                        ${item.competencia}
                    </td>
                    <td>
                        ${item.dias} dias
                    </td>
                    <td>
                        ${parseFloat(
                            item.horas_realizadas
                        ).toFixed(2)} h
                    </td>
                    <td>
                        ${item.observacao || "-"}
                    </td>
                    <td>
                        ${status}
                    </td>
                    <td class="text-center">
                        <button
                            class="btn btn-sm btn-warning"
                            onclick='editar(${JSON.stringify(item)})'>
                            Editar
                        </button>
                        ${botaoAvaliacao}
                    </td>
                </tr> `;
            });
        }
        document.getElementById(
            "lista"
        ).innerHTML = html;
    })
    .catch(err=>{
        console.error(err);
    });
}

// ===============================
// CONTRATOS
// ===============================

function carregarContratos(){
    fetch(urlContratos)
    .then(r=>r.json())
    .then(dados=>{
        let select =
            document.getElementById(
                "contrato_id"
            );
        dados.forEach(c=>{
            let option = document.createElement("option");
            option.value=c.id;
            option.textContent = `${c.numero_contrato} - ${c.estagiario_nome}`;
            select.appendChild(option);
        });
    });
}
// ===============================
// NOVO
// ===============================
function novo(){
    limpar();
    document.getElementById(
        "formTitulo"
    ).innerText =
        "Lançar Nova Frequência";
    document.getElementById(
        "formCard"
    ).style.display="block";
}
// ===============================
// EDITAR
// ===============================
function editar(item){
    document.getElementById(
        "formCard"
    ).style.display="block";
    document.getElementById(
        "formTitulo"
    ).innerText =
        "Editar Frequência";
    document.getElementById(
        "id"
    ).value=item.id;
    document.getElementById(
        "contrato_id"
    ).value=item.contrato_id;
    document.getElementById(
        "competencia"
    ).value=item.competencia;
    document.getElementById(
        "dias"
    ).value=item.dias;
    document.getElementById(
        "horas_realizadas"
    ).value=item.horas_realizadas;
    
    document.getElementById(
        "observacao"
    ).value=item.observacao || "";
    if(item.avaliada){
        document.getElementById(
            "competencia"
        ).readOnly=true;
    }
}
// ===============================
// SALVAR
// ===============================
function salvar(){
    let id =
        document.getElementById(
            "id"
        ).value;
    let dados={
        contrato_id:
            parseInt(
                document.getElementById(
                    "contrato_id"
                ).value
            ),
        competencia:
            document.getElementById(
                "competencia"
            ).value,
        dias:
            parseInt(
                document.getElementById(
                    "dias"
                ).value
            ),
        horas_realizadas:
            parseFloat(
                document.getElementById(
                    "horas_realizadas"
                ).value
            ),
        observacao:
            document.getElementById(
                "observacao"
            ).value || null
    };
    let metodo =
        id ? "PUT" : "POST";
    let destino =
        id ? `${url}/${id}` : url;
    fetch(destino,{
        method:metodo,
        headers:{
            "Content-Type":
            "application/json"
        },
        body:
            JSON.stringify(dados)
    })
    .then(async r=>{
        let retorno =
            await r.json();
        if(!r.ok)
            throw new Error(
                retorno.detail
            );
        alert(
            retorno.mensagem
        );
        cancelar();
        carregar();
    })
    .catch(err=>{
        alert(
            err.message
        );
    });
}

// ===============================
// ABRIR AVALIAÇÃO
// ===============================
function novaAvaliacao(frequenciaId){
    window.location.href =
        `/web/estagiario/avaliacoes?frequencia=${frequenciaId}`;
}
function abrirAvaliacao(id){
    window.location.href =
        `/web/estagiario/avaliacoes?id=${id}`;
}
function cancelar(){
    limpar();
    document.getElementById(
        "formCard"
    ).style.display="none";
}
function limpar(){
    document.getElementById(
        "id"
    ).value="";
    document.getElementById(
        "contrato_id"
    ).value="";
    
    document.getElementById(
        "competencia"
    ).value="";

    document.getElementById(
        "dias"
    ).value="";

    document.getElementById(
        "horas_realizadas"
    ).value="";

    document.getElementById(
        "observacao"
    ).value="";

    document.getElementById(
        "competencia"
    ).readOnly=false;

}

</script>

{% endblock %}
