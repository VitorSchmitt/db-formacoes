{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3>Valores de Bolsa Estágio</h3>
            <small class="text-muted">Cadastro e vigência dos valores pagos por hora</small>
        </div>
        <button class="btn btn-primary" onclick="novo()">
            + Novo Valor de Bolsa
        </button>
    </div>

    <div class="card mb-4" id="formCard" style="display:none;">
        <div class="card-header">Cadastro de Valor</div>
        <div class="card-body">
            
            <input type="hidden" id="id">

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Classificação de Estágio</label>
                    <select class="form-control" id="classificacao_id">
                        <option value="">Carregando opções...</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Valor por Hora (R$)</label>
                    <input type="number" step="0.01" class="form-control" id="valor_hora" placeholder="Ex: 12.50">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Início da Vigência</label>
                    <input type="date" class="form-control" id="data_inicio_vigencia">
                </div>
            </div>

            <div class="mt-2">
                <button class="btn btn-success" onclick="salvar()">Salvar</button>
                <button class="btn btn-secondary" onclick="cancelar()">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Classificação</th>
                        <th>Valor/Hora</th>
                        <th>Início da Vigência</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista">
                    </tbody>
            </table>
        </div>
    </div>

</div>

<script>
const url = "/api/valores_bolsa_estagio";
const urlClassificacoes = "/api/classificacoes_estagio";

// Executado ao carregar a página
document.addEventListener("DOMContentLoaded", () => {
    carregarClassificacoes();
    carregar();
});

// 1. CARREGAR AS CLASSIFICAÇÕES PARA O SELECT DO FORMULÁRIO
function carregarClassificacoes() {
    fetch(urlClassificacoes)
    .then(r => r.json())
    .then(dados => {
        let select = document.getElementById("classificacao_id");
        // Filtra apenas as classificações ativas para novos cadastros
        let ativas = dados.filter(c => c.ativo === true);
        
        let html = '<option value="">Selecione...</option>';
        ativas.forEach(c => {
            html += `<option value="${c.id}">${c.codigo} - ${c.descricao}</option>`;
        });
        select.innerHTML = html;
    })
    .catch(err => console.error("Erro ao carregar classificações:", err));
}

// 2. CARREGAR / LISTAR VALORES DE BOLSA
function carregar() {
    fetch(url)
    .then(r => {
        if (!r.ok) throw new Error("Erro ao buscar dados da API");
        return r.json();
    })
    .then(dados => {
        let html = "";
        dados.forEach(item => {
            // Formata a data recebida (AAAA-MM-DD) para o padrão brasileiro (DD/MM/AAAA)
            const dataFormatada = item.data_inicio_vigencia.split("-").reverse().join("/");
            
            // Formata o valor monetário
            const valorFormatado = item.valor_hora.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            html += `
            <tr>
                <td>${item.classificacao_descricao}</td>
                <td>${valorFormatado}</td>
                <td>${dataFormatada}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick='editar(${JSON.stringify(item)})'>
                        Editar
                    </button>                    
                </td>
            </tr>
            `;
        });
        document.getElementById("lista").innerHTML = html;
    })
    .catch(err => console.error("Erro:", err));
}

// 3. ABRIR FORMULÁRIO DE NOVO REGISTRO
function novo() {
    limpar();
    document.getElementById("formCard").style.display = "block";
}

// 4. EDITAR REGISTRO EXISTENTE
function editar(item) {
    document.getElementById("formCard").style.display = "block";
    document.getElementById("id").value = item.id;
    document.getElementById("classificacao_id").value = item.classificacao_id;
    document.getElementById("valor_hora").value = item.valor_hora;
    document.getElementById("data_inicio_vigencia").value = item.data_inicio_vigencia;
}

// 5. SALVAR (POST ou PUT)
function salvar() {
    const id = document.getElementById("id").value;

    const dados = {
        classificacao_id: parseInt(document.getElementById("classificacao_id").value),
        valor_hora: parseFloat(document.getElementById("valor_hora").value),
        data_inicio_vigencia: document.getElementById("data_inicio_vigencia").value
    };

    // Validação de campos obrigatórios no Front-end
    if (!dados.classificacao_id || isNaN(dados.valor_hora) || !dados.data_inicio_vigencia) {
        alert("Por favor, preencha todos os campos corretamente.");
        return;
    }

    const metodo = id ? "PUT" : "POST";
    const destino = id ? `${url}/${id}` : url;

    fetch(destino, {
        method: metodo,
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(dados)
    })
    .then(async response => {
        if (!response.ok) {
            const erroApi = await response.json();
            throw new Error(erroApi.detail || "Erro ao processar requisição.");
        }
        cancelar();
        carregar();
    })
    .catch(err => {
        alert("Erro ao salvar: " + err.message);
    });
}

// 6. CANCELAR OPERAÇÃO
function cancelar() {
    limpar();
    document.getElementById("formCard").style.display = "none";
}

// 7. LIMPAR CAMPOS DO FORMULÁRIO
function limpar() {
    document.getElementById("id").value = "";
    document.getElementById("classificacao_id").value = "";
    document.getElementById("valor_hora").value = "";
    document.getElementById("data_inicio_vigencia").value = "";
}
</script>

{% endblock %}
