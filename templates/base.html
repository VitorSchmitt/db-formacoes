<!DOCTYPE html>
<html>
<head>
    <title>Sistema</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            display: flex;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #343a40;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 10px 0;
            padding: 5px;
            border-radius: 4px;
        }

        .sidebar a:hover {
            background: #495057;
            padding-left: 10px;
        }

        .sidebar a.active {
            background: #0d6efd;
        }

        .content {
            flex: 1;
            padding: 20px;
            background: #f5f5f5;
        }
    </style>
</head>

<body>

<!-- MENU LATERAL -->
<div class="sidebar">
    <h4>Sistema</h4>
    <hr>

    <ul id="menu-lateral" class="nav flex-column"></ul>

    <hr>

    <a href="#" onclick="logout()">🚪 Sair</a>
    <a href="/docs">⚙️ API Docs</a>
</div>

<!-- CONTEÚDO -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- ===================== -->
<!-- SCRIPT GLOBAL -->
<!-- ===================== -->
<script>

//
// 🔐 CONFIG MENU POR PERFIL
//
const MENUS = {
    admin: [
        { nome: "Dashboard", url: "/web/dashboard", icon: "📊" },
        { nome: "Formações", url: "/web/formacoes", icon: "📚" },
        { nome: "Servidores", url: "/web/servidores", icon: "👥" },
        { nome: "Participações", url: "/web/participacoes", icon: "📋" },
        { nome: "Usuários", url: "/web/usuarios", icon: "👤" }
    ],

    operador: [
        { nome: "Formações", url: "/web/formacoes", icon: "📚" },
        { nome: "Servidores", url: "/web/servidores", icon: "👥" },
        { nome: "Participações", url: "/web/participacoes", icon: "📋" }
    ],

    custom: [
        { nome: "Formações", url: "/web/formacoes", icon: "📚" },
        { nome: "Servidores", url: "/web/servidores", icon: "👥" }
    ]
};


//
// 🔐 API GLOBAL (HEADERS AUTOMÁTICOS)
//
function api(url, options = {}) {
    return fetch(url, {
        ...options,
        headers: {
            "Content-Type": "application/json",
            "perfil": localStorage.getItem("perfil"),
            ...(options.headers || {})
        }
    });
}


//
// 🧠 MONTA MENU DINÂMICO
//
function montarMenu() {

    let perfil = localStorage.getItem("perfil");

    let paginaAtual = window.location.pathname;

    // páginas públicas
    let liberadas = ["/"];

    if (!perfil && !liberadas.includes(paginaAtual)) {
        window.location = "/";
        return;
    }

    let menu = document.getElementById("menu-lateral");
    menu.innerHTML = "";

    let itens = MENUS[perfil] || [];

    itens.forEach(item => {

        let li = document.createElement("li");
        li.className = "nav-item";

        let ativo = (paginaAtual === item.url) ? "active" : "";

        li.innerHTML = `
            <a class="nav-link ${ativo}" href="${item.url}">
                ${item.icon} ${item.nome}
            </a>
        `;

        menu.appendChild(li);
    });
}


//
// 🚪 LOGOUT
//
function logout() {
    localStorage.clear();
    window.location = "/";
}


//
// 🚀 INIT
//
montarMenu();

</script>

</body>
</html>
