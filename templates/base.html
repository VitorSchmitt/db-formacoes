<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Sistema</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <!-- ===================================================== -->
    <!-- SCRIPT GLOBAL -->
    <!-- ===================================================== -->
    <script>

    // 🌐 API GLOBAL
    window.api = async function(url, options = {}) {

        try {

            let res = await fetch(url, {

                credentials: "include",

                ...options,

                headers: {
                    "Content-Type": "application/json",
                    ...(options.headers || {})
                }
            });

            // 🔴 NÃO AUTENTICADO
            if (res.status === 401) {

                window.location.href = "/";

                return;
            }

            // 🔴 SEM PERMISSÃO
            if (res.status === 403) {

                alert("Sem permissão para acessar este recurso");

                return;
            }

            return res;

        } catch (err) {

            console.error("Erro na API:", err);

            alert("Erro de conexão com o servidor");
        }
    };


    // =====================================================
    // MENU DINÂMICO
    // =====================================================
    function montarMenu() {

        const perfil = localStorage.getItem("perfil");

        const paginaAtual = window.location.pathname;

        const menus = {

            admin: [

                ["/web/dashboard", "📊 Dashboard"],
            
                {
                    grupo: "📚 Cadastros",
                    itens: [
                        ["/web/formacoes", "📚 Formações"],
                        ["/web/servidores", "👥 Servidores"],
                        ["/web/facilitadores", "🎓 Facilitadores"],
                        ["/web/lotacoes", "🧭 Lotações"]
                    ]
                },
            
                {
                    grupo: "📋 Relatórios",
                    itens: [
                        ["/web/relatorio_facilitador", "🎓📚 Relatório Facilitadores"],
                        ["/web/relatorio_servidor", "👤📚 Formações por Servidor"],
                        ["/web/participacoes", "📊 Participações"],
                        ["/web/certificados", "📜 Certificados"]
                    ]
                },
            
                {
                    grupo: "📅 Planejamento",
                    itens: [
                        ["/web/cronograma", "📅 Cronograma"],
                        ["/web/plano_anual", "📘 Plano Anual"]
                    ]
                },
            
                {
                    grupo: "⚙️ Administração",
                    itens: [
                        ["/web/usuarios", "👤 Usuários"]
                    ]
                }
            ],
            operador: [ 
                ["/web/dashboard", "📊 Dashboard"],                
                ["/web/relatorio_servidor", "👤📚 Formações por Servidor"],
                ["/web/participacoes", "📊 Participações"],                
                ["/web/certificados", "📜 Certificados"]
            ],
            operadorII: [

                ["/web/dashboard", "📊 Dashboard"],
                ["/web/formacoes", "📚 Formações"],
                ["/web/servidores", "👥 Servidores"],  
                ["/web/lotacoes", "🧭 Lotações"],
                ["/web/facilitadores", "🎓 Facilitadores"],
                ["/web/relatorio_facilitador", "🎓📚 Relatório Facilitadores"]
                
            ],

            custom: [
                ["/web/dashboard", "📊 Dashboard"],
                ["/web/cronograma", "📅 Cronograma"],               
                ["/web/plano_anual","📘 Plano Anual"]                
            ]
        };

        const container = document.getElementById("menu");

        container.innerHTML = "";

        if (!menus[perfil]) {

            container.innerHTML = `
                <p class="text-light">
                    Sem acesso
                </p>
            `;

            return;
        }

       menus[perfil].forEach((item, indice) => {

            if (item.grupo) {
        
                const grupoId = `grupo_${indice}`;
        
                container.innerHTML += `
        
                    <div
                        class="menu-header"
                        onclick="toggleGrupo('${grupoId}', this)"
                    >
        
                        <span>${item.grupo}</span>
        
                        <span class="menu-seta">▸</span>
        
                    </div>
        
                    <div
                        id="${grupoId}"
                        class="menu-itens"
                    >
        
                        ${item.itens.map(menu => {
        
                            let ativo =
                                paginaAtual === menu[0]
                                ? "ativo"
                                : "";
        
                            return `
                                <a href="${menu[0]}"
                                   class="${ativo}">
                                   ${menu[1]}
                                </a>
                            `;
        
                        }).join("")}
        
                    </div>
                `;
        
                return;
            }
        
            let ativo =
                paginaAtual === item[0]
                ? "ativo"
                : "";
        
            container.innerHTML += `
                <a href="${item[0]}"
                   class="${ativo}">
                    ${item[1]}
                </a>
            `;
        });
    }


    // =====================================================
    // LOGOUT
    // =====================================================
    function logout() {

            localStorage.clear();
    
            window.location.href = "/";
        }
    
        function toggleGrupo(id, elemento) {
    
        const grupo =
            document.getElementById(id);
    
        const seta =
            elemento.querySelector(".menu-seta");
    
        grupo.classList.toggle("aberto");
    
        if (grupo.classList.contains("aberto")) {
    
            seta.innerHTML = "▾";
    
        } else {
    
            seta.innerHTML = "▸";
        }
    }


    // =====================================================
    // INIT
    // =====================================================
    window.addEventListener(
        "DOMContentLoaded",
        montarMenu
    );

    </script>


    <!-- ===================================================== -->
    <!-- ESTILO -->
    <!-- ===================================================== -->
    <style>
            .menu-grupo {
        
            color: #111827;
            font-size: 0.80rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 18px;        
            margin-bottom: 8px;        
            padding-left: 10px;
        }
        .menu-header {

            display:flex;
            justify-content:space-between;
            align-items:center;
        
            cursor:pointer;
        
            padding:10px;
        
            margin-top:14px;
        
            font-size:.85rem;
        
            font-weight:800;
        
            text-transform:uppercase;
        
            letter-spacing:1px;
        
            border-radius:8px;
        }
        
        .menu-header:hover {
            background:#eef2f7;
        }
        
        .menu-itens {
            display:none;
        }
        
        .menu-itens.aberto {
            display:block;
        }

        .menu-itens a {

            padding-left: 32px !important;        
            font-size: 0.92rem;
        }
        
        .menu-seta {
            font-size:12px;
        }
        :root {
        
            --sidebar-bg: #f8f9fa;      /* fundo claro */
            --sidebar-hover: #e9ecef;   /* hover cinza claro */
            --sidebar-active: #dbeafe;  /* azul claro */
        
            --content-bg: #f3f4f6;
        
            --text-light: #111827;      /* texto preto */
            --text-muted: #374151;      /* texto cinza escuro */
        
            --border-color: #d1d5db;
        }


    /* =====================================================
       BODY
    ===================================================== */

    body {

        display: flex;

        margin: 0;

        min-height: 100vh;

        background: var(--content-bg);

        font-family:
        Inter,
        "Segoe UI",
        sans-serif;
        color: #111827;
    }


    /* =====================================================
       SIDEBAR
    ===================================================== */

    .sidebar {

        width: 220px;

        background: var(--sidebar-bg);

        color: var(--text-light);

        padding: 24px 16px;

        display: flex;

        flex-direction: column;

        box-shadow:
            2px 0 10px rgba(0,0,0,0.08);
    }


    .sidebar h4 {

        font-size: 1.1rem;

        font-weight: 600;

        margin-bottom: 24px;

         color: #111827;

        letter-spacing: 0.5px;
    }
    .sidebar-logo {

        background: linear-gradient(
            135deg,
            #2563eb,
            #1d4ed8
        );
    
        color: white;
    
        padding: 18px 14px;
    
        border-radius: 12px;
    
        margin-bottom: 20px;
    
        box-shadow:
            0 4px 10px rgba(37,99,235,.25);
    }
    
    .logo-titulo {
    
        font-size: 1.2rem;
    
        font-weight: 700;
    
        letter-spacing: 1px;
    }

    .logo-subtitulo {
    
        font-size: .82rem;
    
        opacity: .9;
    
        margin-top: 4px;
    }

    .sidebar hr {
        border-color: #d1d5db;
    }


    .sidebar a {

        color: var(--text-muted);

        text-decoration: none;

        display: flex;

        align-items: center;

        padding: 12px 14px;

        margin-bottom: 6px;

        border-radius: 10px;

        transition:
            background 0.2s ease,
            color 0.2s ease,
            transform 0.15s ease;
    }


    .sidebar a:hover {
        background: var(--sidebar-hover);
        color: #111827;
        transform: translateX(3px);
    }


    .sidebar a.ativo {
        
        background: var(--sidebar-active);
        color: #111827;
        font-weight: 600;
    }


    /* =====================================================
       CONTENT
    ===================================================== */

    .content {

        flex: 1;

        padding: 28px;

        background: var(--content-bg);

        overflow-y: auto;

        min-height: 100vh;
    }


    /* =====================================================
       CARDS / FORMULÁRIOS
    ===================================================== */

    .card-custom {

        background: white;

        border-radius: 14px;

        padding: 24px;

        border: 1px solid var(--border-color);

        box-shadow:
            0 2px 8px rgba(0,0,0,0.04);
    }


    /* =====================================================
       TÍTULOS
    ===================================================== */

    h2 {

        font-weight: 600;

        margin-bottom: 20px;
    }


    h5 {

        font-weight: 600;
    }


    /* =====================================================
       TABELAS
    ===================================================== */

    .table {

        font-size: 0.95rem;

        background: white !important;

        border-radius: 10px;

        overflow: hidden;

        margin-bottom: 0;
    }


    .table thead {

        background: #f9fafb !important;
        color: #111827 !important;
    }


    .table th,
    .table td {
        font-weight: 700;
        border-bottom: 2px solid #e5e7eb;
        vertical-align: middle;
    }


    /* =====================================================
       FORMULÁRIOS
    ===================================================== */

    .form-control,
    .form-select {

        border-radius: 10px;
    }


    /* =====================================================
       BOTÕES
    ===================================================== */

    .btn {

        border-radius: 10px;
    }


    .btn-primary {

        background: #2563eb;

        border: none;
    }


    .btn-primary:hover {

        background: #1d4ed8;
    }


    .btn-warning {

        color: white;

        background: #f59e0b;

        border: none;
    }


    .btn-warning:hover {

        background: #d97706;
    }


    .btn-danger {

        border: none;
    }


    .btn-success {

        border: none;
    }


    /* =====================================================
       ALERTAS
    ===================================================== */

    .alert {

        border-radius: 10px;
    }

    </style>

</head>


<body>

    <!-- ===================================================== -->
    <!-- MENU -->
    <!-- ===================================================== -->
    <div class="sidebar">

        <div class="sidebar-logo">
            <div class="logo-titulo">
                NTEV
            </div>        
            <div class="logo-subtitulo">
                Sistema de Formações
            </div>
        
        </div>
        <div id="menu"></div>

        <hr>

        <a href="#"
           onclick="logout()">
            🚪 Sair
        </a>

        <a href="/docs"
           target="_blank">
            ⚙️ API Docs
        </a>

    </div>


    <!-- ===================================================== -->
    <!-- CONTEÚDO -->
    <!-- ===================================================== -->
    <div class="content">

        <div class="card-custom">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</body>

</html>
