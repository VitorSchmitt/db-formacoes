<!DOCTYPE html>
<html>
<head>
    <title>Sistema</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            display: flex;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #343a40;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 10px 0;
        }

        .sidebar a:hover {
            background: #495057;
            padding-left: 10px;
        }

        .content {
            flex: 1;
            padding: 20px;
            background: #f5f5f5;
        }
    </style>
</head>

<body>

    <!-- MENU LATERAL -->
    <div class="sidebar">
        <h4>Sistema</h4>
        <hr>

        <a href="/web/dashboard">📊 Dashboard</a>
        <a href="/web/formacoes">📚 Formações</a>
        <a href="/docs">⚙️ API Docs</a>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
