<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <!-- ===================== -->
    <!-- SCRIPT GLOBAL -->
    <!-- ===================== -->
    <script>

    // 🌐 API GLOBAL
    window.api = async function(url, options = {}) {

        try {

            let res = await fetch(url, {
                credentials: "include",
                ...options,
                headers: {
                    "Content-Type": "application/json",
                    ...(options.headers || {})
                }
            });

            // 🔴 NÃO AUTENTICADO
            if (res.status === 401) {
                window.location.href = "/";
                return;
            }

            // 🔴 SEM PERMISSÃO
            if (res.status === 403) {
                alert("Sem permissão para acessar este recurso");
                return;
            }

            return res;

        } catch (err) {
            console.error("Erro na API:", err);
            alert("Erro de conexão com o servidor");
        }
    }

    // 🎯 MENU DINÂMICO
    function montarMenu() {

        const perfil = localStorage.getItem("perfil");
        const paginaAtual = window.location.pathname;

        const menus = {

            admin: [
                ["/web/dashboard", "📊 Dashboard"],
                ["/web/formacoes", "📚 Formações"],
                ["/web/servidores", "👥 Servidores"],
                ["/web/participacoes", "📊 Participações"],
                ["/web/usuarios", "👤 Usuários"],
                ["/web/lotacoes", "🧭 Lotações"]
            ],

            operador: [
                ["/web/dashboard", "📊 Dashboard"],
                ["/web/formacoes", "📚 Formações"],
                ["/web/servidores", "👥 Servidores"],
                ["/web/participacoes", "📊 Participações"],
                ["/web/lotacoes", "🧭 Lotações"]
            ],

            custom: [
                ["/web/dashboard", "📊 Dashboard"],
                ["/web/formacoes", "📚 Formações"],
                ["/web/servidores", "👥 Servidores"]
            ]
        };

        const container = document.getElementById("menu");

        container.innerHTML = "";

        if (!menus[perfil]) {
            container.innerHTML = "<p>Sem acesso</p>";
            return;
        }

        menus[perfil].forEach(item => {

            let ativo = paginaAtual === item[0] ? "ativo" : "";

            container.innerHTML += `
                <a href="${item[0]}" class="${ativo}">
                    ${item[1]}
                </a>
            `;
        });
    }

    // 🚪 LOGOUT
    function logout() {
        localStorage.clear();
        window.location.href = "/";
    }

    // 🔄 INIT
    window.addEventListener("DOMContentLoaded", montarMenu);

    </script>

<style>

    :root{
        --sidebar-bg: #1f2937;
        --sidebar-hover: #374151;
        --sidebar-active: #2563eb;

        --content-bg: #f3f4f6;

        --text-light: #f9fafb;
        --text-muted: #d1d5db;

        --border-color: #e5e7eb;
    }

    body{
        display: flex;
        margin: 0;
        height: 100vh;
        background: var(--content-bg);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #111827;
    }

    /* =========================================
       SIDEBAR
    ========================================= */

    .sidebar{
        width: 240px;
        background: var(--sidebar-bg);
        color: var(--text-light);
        padding: 24px 16px;

        display: flex;
        flex-direction: column;

        box-shadow:
            2px 0 10px rgba(0,0,0,0.08);
    }

    .sidebar h4{
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 24px;
        color: white;
        letter-spacing: 0.5px;
    }

    .sidebar a{
        color: var(--text-muted);
        text-decoration: none;

        display: flex;
        align-items: center;

        padding: 12px 14px;
        margin-bottom: 6px;

        border-radius: 10px;

        transition:
            background 0.2s ease,
            color 0.2s ease,
            transform 0.15s ease;
    }

    .sidebar a:hover{
        background: var(--sidebar-hover);
        color: white;
        transform: translateX(3px);
    }

    .sidebar a.ativo{
        background: var(--sidebar-active);
        color: white;
        font-weight: 600;
    }

    /* =========================================
       CONTENT
    ========================================= */

    .content{
        flex: 1;

        padding: 28px;

        background: var(--content-bg);

        overflow-y: auto;
    }

    /* =========================================
       CARDS / FORMULÁRIOS
    ========================================= */

    .card-custom{
        background: white;

        border-radius: 14px;

        padding: 20px;

        border: 1px solid var(--border-color);

        box-shadow:
            0 2px 8px rgba(0,0,0,0.04);
    }

    /* =========================================
       TABELAS
    ========================================= */

    table{
        background: white;
        border-radius: 10px;
        overflow: hidden;
    }

    .table thead{
        background: #111827;
        color: white;
    }

    /* =========================================
       BOTÕES
    ========================================= */

    .btn-primary{
        background: #2563eb;
        border: none;
    }

    .btn-primary:hover{
        background: #1d4ed8;
    }

    .btn-warning{
        color: white;
        background: #f59e0b;
        border: none;
    }

    .btn-warning:hover{
        background: #d97706;
    }

    .btn-danger{
        border: none;
    }

    .btn-success{
        border: none;
    }

</style>

</head>

<body>

    <!-- ===================== -->
    <!-- MENU LATERAL -->
    <!-- ===================== -->
    <div class="sidebar">

        <h4>Sistema de formações</h4>

        <hr>

        <div id="menu"></div>

        <hr>

        <a href="#" onclick="logout()">🚪 Sair</a>

        <a href="/docs" target="_blank">⚙️ API Docs</a>

    </div>

    <!-- ===================== -->
    <!-- CONTEÚDO -->
    <!-- ===================== -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
