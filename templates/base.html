<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly (se usar gráficos) -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            display: flex;
            margin: 0;
        }

        .sidebar {
            width: 230px;
            height: 100vh;
            background: #343a40;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 10px 0;
            padding: 5px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #495057;
            padding-left: 10px;
        }

        .content {
            flex: 1;
            padding: 20px;
            background: #f5f5f5;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<!-- ===================== -->
<!-- MENU LATERAL -->
<!-- ===================== -->
<div class="sidebar">
    <h4>Sistema</h4>
    <hr>

    <div id="menu"></div>

    <hr>

    <a href="#" onclick="logout()">🚪 Sair</a>
    <a href="/docs">⚙️ API Docs</a>
</div>

<!-- ===================== -->
<!-- CONTEÚDO -->
<!-- ===================== -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- ===================== -->
<!-- SCRIPT GLOBAL -->
<!-- ===================== -->
<script>

//
// 🔐 PROTEÇÃO GLOBAL
//
if (!localStorage.getItem("token")) {
    window.location.href = "/";
}

//
// 🌐 API GLOBAL (JWT)
//
function api(url, options = {}) {
    return fetch(url, {
        ...options,
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token"),
            ...(options.headers || {})
        }
    });
}

//
// 🎯 MENU DINÂMICO POR PERFIL
//
function montarMenu() {

    let perfil = localStorage.getItem("perfil");

    if (!perfil) {
        logout();
        return;
    }

    const menus = {

        admin: [
            ["/web/dashboard", "📊 Dashboard"],
            ["/web/formacoes", "📚 Formações"],
            ["/web/servidores", "👥 Servidores"],
            ["/web/participacoes", "📊 Participações"],
            ["/web/usuarios", "👤 Usuários"]
        ],

        operador: [
            ["/web/dashboard", "📊 Dashboard"],
            ["/web/formacoes", "📚 Formações"],
            ["/web/servidores", "👥 Servidores"],
            ["/web/participacoes", "📊 Participações"]
        ],

        custom: [
            ["/web/dashboard", "📊 Dashboard"],
            ["/web/formacoes", "📚 Formações"],
            ["/web/servidores", "👥 Servidores"]
        ]
    };

    let container = document.getElementById("menu");

    container.innerHTML = "";

    if (!menus[perfil]) {
        container.innerHTML = "<p>Sem acesso</p>";
        return;
    }

    menus[perfil].forEach(item => {
        container.innerHTML += `<a href="${item[0]}">${item[1]}</a>`;
    });
}

//
// 🚪 LOGOUT
//
function logout() {
    localStorage.clear();
    window.location.href = "/";
}

//
// 🔄 INIT
//
window.onload = montarMenu;

</script>

</body>
</html>
