<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            display: flex;
            margin: 0;
            height: 100vh;
        }

        .sidebar {
            width: 230px;
            background: #343a40;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 10px 0;
            padding: 6px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #495057;
            padding-left: 12px;
        }

        .sidebar a.ativo {
            background: #0d6efd;
        }

        .content {
            flex: 1;
            padding: 20px;
            background: #f5f5f5;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<!-- ===================== -->
<!-- MENU LATERAL -->
<!-- ===================== -->
<div class="sidebar">
    <h4>Sistema</h4>
    <hr>

    <div id="menu"></div>

    <hr>

    <a href="#" onclick="logout()">🚪 Sair</a>
    <a href="/docs" target="_blank">⚙️ API Docs</a>
</div>

<!-- ===================== -->
<!-- CONTEÚDO -->
<!-- ===================== -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- ===================== -->
<!-- SCRIPT GLOBAL -->
<!-- ===================== -->
<script>

//
// 🔐 PROTEÇÃO GLOBAL
//
(function proteger() {
    const pagina = window.location.pathname;

    // páginas públicas (login)
    const liberadas = ["/"];

    if (!localStorage.getItem("token") && !liberadas.includes(pagina)) {
        window.location.href = "/";
    }
})();

//
// 🌐 API GLOBAL (JWT)
//
async function api(url, options = {}) {

    try {
        let res = await fetch(url, {
            ...options,
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + localStorage.getItem("token"),
                ...(options.headers || {})
            }
        });

        // 🔴 TOKEN EXPIRADO OU INVÁLIDO
        if (res.status === 401) {
            logout();
            return;
        }

        // 🔴 SEM PERMISSÃO
        if (res.status === 403) {
            alert("Sem permissão para acessar este recurso");
            return;
        }

        return res;

    } catch (err) {
        console.error("Erro na API:", err);
        alert("Erro de conexão com o servidor");
    }
}

//
// 🎯 MENU DINÂMICO
//
function montarMenu() {

    const perfil = localStorage.getItem("perfil");
    const paginaAtual = window.location.pathname;

    const menus = {

        admin: [
            ["/web/dashboard", "📊 Dashboard"],
            ["/web/formacoes", "📚 Formações"],
            ["/web/servidores", "👥 Servidores"],
            ["/web/participacoes", "📊 Participações"],
            ["/web/usuarios", "👤 Usuários"]
        ],

        operador: [
            ["/web/dashboard", "📊 Dashboard"],
            ["/web/formacoes", "📚 Formações"],
            ["/web/servidores", "👥 Servidores"],
            ["/web/participacoes", "📊 Participações"]
        ],

        custom: [
            ["/web/dashboard", "📊 Dashboard"],
            ["/web/formacoes", "📚 Formações"],
            ["/web/servidores", "👥 Servidores"]
        ]
    };

    const container = document.getElementById("menu");

    container.innerHTML = "";

    if (!menus[perfil]) {
        container.innerHTML = "<p>Sem acesso</p>";
        return;
    }

    menus[perfil].forEach(item => {

        let ativo = paginaAtual === item[0] ? "ativo" : "";

        container.innerHTML += `
            <a href="${item[0]}" class="${ativo}">
                ${item[1]}
            </a>
        `;
    });
}

//
// 🚪 LOGOUT
//
function logout() {
    localStorage.clear();
    window.location.href = "/";
}

//
// 🔄 INIT
//
window.addEventListener("DOMContentLoaded", montarMenu);

</script>

</body>
</html>
