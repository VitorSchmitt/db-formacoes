{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <!-- TÍTULO -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            📜 Certificados
        </h2>
    </div>


    <!-- FILTROS -->
    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <div class="row g-3">

                <div class="col-md-8">

                    <label class="form-label">
                        Formação
                    </label>

                    <select
                        id="formacao"
                        class="form-select"
                    >
                        <option value="">
                            Selecione uma formação
                        </option>
                    </select>

                </div>

                <div class="col-md-4 d-flex align-items-end">

                    <button
                        class="btn btn-primary w-100"
                        onclick="buscar()"
                    >
                        🔍 Buscar Aptos
                    </button>

                </div>

            </div>

        </div>

    </div>


    <!-- RESUMO -->
    <div
        id="resumo"
        class="alert alert-info d-none"
    >
    </div>


    <!-- TABELA -->
    <div class="card shadow-sm">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-light">

                        <tr>

                            <th>Servidor</th>

                            <th width="150">
                                CH Formação
                            </th>

                            <th width="150">
                                CH Realizada
                            </th>

                            <th width="120">
                                %
                            </th>

                            <th width="180">
                                Certificado
                            </th>

                        </tr>

                    </thead>

                    <tbody id="tabela">

                        <tr>

                            <td
                                colspan="5"
                                class="text-center text-muted py-4"
                            >
                                Selecione uma formação
                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>



<script>


// ==============================
// CARREGAR FORMAÇÕES
// ==============================
async function carregarFormacoes() {

    try {

        let response = await fetch(
            "/api/certificados/formacoes"
        )

        let dados = await response.json()

        let select =
            document.getElementById("formacao")

        dados.forEach(f => {

            select.innerHTML += `
                <option value="${f.id}">
                    ${f.descricao}
                </option>
            `
        })

    } catch (error) {

        console.error(error)

        alert(
            "Erro ao carregar formações"
        )
    }
}



// ==============================
// BUSCAR SERVIDORES APTOS
// ==============================
async function buscar() {

    let formacao_id =
        document.getElementById("formacao").value

    if (!formacao_id) {

        alert(
            "Selecione uma formação"
        )

        return
    }

    try {

        let response = await fetch(
            `/api/certificados/${formacao_id}`
        )

        let dados = await response.json()

        let tabela =
            document.getElementById("tabela")

        let resumo =
            document.getElementById("resumo")

        tabela.innerHTML = ""



        // ==========================
        // SEM RESULTADOS
        // ==========================
        if (dados.length === 0) {

            resumo.classList.add("d-none")

            tabela.innerHTML = `
                <tr>

                    <td
                        colspan="5"
                        class="text-center text-muted py-4"
                    >
                        Nenhum servidor atingiu 75%
                    </td>

                </tr>
            `

            return
        }



        // ==========================
        // RESUMO
        // ==========================
        resumo.classList.remove("d-none")

        resumo.innerHTML = `
            <strong>
                ${dados.length}
            </strong>

            servidor(es) aptos para certificado
        `



        // ==========================
        // TABELA
        // ==========================
        dados.forEach(item => {

            let badge = ""

            if (item.percentual >= 100) {

                badge = `
                    <span class="badge bg-success">
                        100%
                    </span>
                `

            } else {

                badge = `
                    <span class="badge bg-primary">
                        ${item.percentual}%
                    </span>
                `
            }


            tabela.innerHTML += `

                <tr>

                    <td>

                        <strong>
                            ${item.servidor}
                        </strong>

                        <br>

                        <small class="text-muted">
                            Matrícula:
                            ${item.matricula}
                        </small>

                    </td>


                    <td>
                        ${item.carga_total}h
                    </td>


                    <td>
                        ${item.carga_realizada}h
                    </td>


                    <td>
                        ${badge}
                    </td>


                    <td>

                        <button
                            class="btn btn-success btn-sm"
                            onclick="emitir(${item.participacao_id})"
                        >
                            📄 Emitir PDF
                        </button>

                    </td>

                </tr>

            `
        })

    } catch (error) {

        console.error(error)

        alert(
            "Erro ao buscar certificados"
        )
    }
}



// ==============================
// EMITIR CERTIFICADO
// ==============================
function emitir(participacao_id) {

    window.open(
        `/api/certificados/pdf/${participacao_id}`,
        "_blank"
    )
}



// ==============================
// INIT
// ==============================
carregarFormacoes()


</script>

{% endblock %}
