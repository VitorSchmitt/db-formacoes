{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">
    📊 Dashboard de Formações
</h2>

<div id="erro"
     class="alert alert-danger"
     style="display:none">
</div>

<div id="loading"
     class="mb-3"
     style="display:none; font-weight:bold;">
    Carregando...
</div>


<!-- ========================================= -->
<!-- FILTROS -->
<!-- ========================================= -->

<div class="card shadow-sm border-0 mb-4">

    <div class="card-body">

        <div class="row g-3">

            <div class="col-md-2">

                <label class="form-label">
                    Início
                </label>

                <input type="month"
                       id="mes_inicio"
                       class="form-control">

            </div>

            <div class="col-md-2">

                <label class="form-label">
                    Fim
                </label>

                <input type="month"
                       id="mes_fim"
                       class="form-control">

            </div>

            <div class="col-md-3">

                <label class="form-label">
                    Lotação
                </label>

                <select id="filtroLotacao"
                        class="form-control">

                    <option value="">
                        Todas Lotações
                    </option>

                </select>

            </div>

            <div class="col-md-3">

                <label class="form-label">
                    Curso
                </label>

                <select id="filtroCurso"
                        class="form-control">

                    <option value="">
                        Todos Cursos
                    </option>

                </select>

            </div>

            <div class="col-md-1 d-flex align-items-end">

                <button onclick="carregar()"
                        class="btn btn-dark w-100">

                    OK

                </button>

            </div>

            <div class="col-md-1 d-flex align-items-end">

                <button onclick="limparFiltros()"
                        class="btn btn-secondary w-100">

                    ⟲

                </button>

            </div>

        </div>

    </div>

</div>


<!-- ========================================= -->
<!-- CARDS 1 -->
<!-- ========================================= -->

<div class="row mb-4 g-3">

    <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

            <div class="card-body text-center">

                <h6 class="text-muted">
                    Participações
                </h6>

                <h2 id="total"
                    class="fw-bold text-primary">

                    0

                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

            <div class="card-body text-center">

                <h6 class="text-muted">
                    Certificados
                </h6>

                <h2 id="certificados"
                    class="fw-bold text-success">

                    0

                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

            <div class="card-body text-center">

                <h6 class="text-muted">
                    Evasão
                </h6>

                <h2 id="evasao"
                    class="fw-bold text-danger">

                    0

                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

            <div class="card-body text-center">

                <h6 class="text-muted">
                    Taxa Evasão
                </h6>

                <h2 id="taxaEvasao"
                    class="fw-bold text-warning">

                    0%

                </h2>

            </div>

        </div>

    </div>

</div>


<!-- ========================================= -->
<!-- CARDS 2 -->
<!-- ========================================= -->

<div class="row mb-4 g-3">

    <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

            <div class="card-body text-center">

                <h6 class="text-muted">
                    Cursos
                </h6>

                <h2 id="totalCursos"
                    class="fw-bold">

                    0

                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

            <div class="card-body text-center">

                <h6 class="text-muted">
                    Lotações
                </h6>

                <h2 id="totalLotacoes"
                    class="fw-bold">

                    0

                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

            <div class="card-body text-center">

                <h6 class="text-muted">
                    Carga Horária
                </h6>

                <h2 id="cargaRealizada"
                    class="fw-bold text-info">

                    0h

                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card border-0 shadow-sm h-100">

            <div class="card-body text-center">

                <h6 class="text-muted">
                    Média Servidor
                </h6>

                <h2 id="mediaServidor"
                    class="fw-bold text-dark">

                    0

                </h2>

            </div>

        </div>

    </div>

</div>


<!-- ========================================= -->
<!-- GRÁFICOS -->
<!-- ========================================= -->

<div class="row">

    <div class="col-md-6 mb-4">

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div id="g1"></div>

            </div>

        </div>

    </div>

    <div class="col-md-6 mb-4">

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div id="g2"></div>

            </div>

        </div>

    </div>

</div>


<div class="row">

    <div class="col-md-12 mb-4">

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div id="g3"></div>

            </div>

        </div>

    </div>

</div>


<div class="row">

    <div class="col-md-6 mb-4">

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div id="g4"></div>

            </div>

        </div>

    </div>

    <div class="col-md-6 mb-4">

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div id="g5"></div>

            </div>

        </div>

    </div>

</div>


<script>

(() => {

let filtros = {

    mes_inicio: "",

    mes_fim: "",

    lotacao: "",

    curso: ""
};

let filtrosCarregados = false;


// ====================================
// HELPERS
// ====================================

function mostrarErro(msg) {

    let div = document.getElementById("erro");

    div.innerText = msg;

    div.style.display = "block";
}

function esconderErro() {

    document.getElementById("erro")
        .style.display = "none";
}

function mostrarLoading() {

    document.getElementById("loading")
        .style.display = "block";
}

function esconderLoading() {

    document.getElementById("loading")
        .style.display = "none";
}


// ====================================
// URL
// ====================================

function montarURL() {

    return (

        `/api/dashboard?` +

        `mes_inicio=${encodeURIComponent(filtros.mes_inicio)}` +

        `&mes_fim=${encodeURIComponent(filtros.mes_fim)}` +

        `&lotacao=${encodeURIComponent(filtros.lotacao)}` +

        `&curso=${encodeURIComponent(filtros.curso)}`
    );
}


// ====================================
// CARREGAR
// ====================================

async function carregar() {

    try {

        mostrarLoading();

        esconderErro();

        let url = montarURL();

        let res = await api(url);

        if (res.status === 401) {

            localStorage.clear();

            window.location.href = "/";

            return;
        }

        let data = await res.json();

        esconderLoading();

        if (data.erro) {

            mostrarErro(data.erro);

            return;
        }

        atualizarCards(data);

        if (!filtrosCarregados) {

            preencherFiltros(data);

            filtrosCarregados = true;
        }

        montarGraficos(data);

    } catch (err) {

        esconderLoading();

        console.error(err);

        mostrarErro(
            "Erro ao carregar dashboard"
        );
    }
}


// ====================================
// CARDS
// ====================================

function atualizarCards(data) {

    let cards = data.cards || {};

    document.getElementById("total").innerText =
        cards.participacoes || 0;

    document.getElementById("certificados").innerText =
        cards.certificados || 0;

    document.getElementById("evasao").innerText =
        cards.evasao || 0;

    document.getElementById("taxaEvasao").innerText =
        (cards.taxa_evasao || 0) + "%";

    document.getElementById("totalCursos").innerText =
        data.curso?.length || 0;

    document.getElementById("totalLotacoes").innerText =
        data.lotacao?.length || 0;

    document.getElementById("cargaRealizada").innerText =
        (cards.carga_realizada || 0) + "h";

    document.getElementById("mediaServidor").innerText =
        cards.media_por_servidor || 0;
}


// ====================================
// FILTROS
// ====================================

function preencherFiltros(data) {

    let lot = document.getElementById(
        "filtroLotacao"
    );

    let curso = document.getElementById(
        "filtroCurso"
    );

    lot.innerHTML =
        '<option value="">Todas Lotações</option>';

    curso.innerHTML =
        '<option value="">Todos Cursos</option>';

    let lotacoesUnicas = [

        ...new Map(
            data.lotacao.map(
                x => [x.lotacao, x]
            )
        ).values()
    ];

    let cursosUnicos = [

        ...new Map(
            data.curso.map(
                x => [x.formacao, x]
            )
        ).values()
    ];

    lotacoesUnicas.forEach(x => {

        let opt = new Option(
            x.lotacao,
            x.lotacao
        );

        lot.add(opt);
    });

    cursosUnicos.forEach(x => {

        let opt = new Option(
            x.formacao,
            x.formacao
        );

        curso.add(opt);
    });
}


// ====================================
// GRÁFICOS
// ====================================

function montarGraficos(data) {

    let lotTop = [...data.lotacao]

        .sort((a, b) => b.qtd - a.qtd)

        .slice(0, 10);

    let cursoTop = [...data.curso]

        .sort((a, b) => b.qtd - a.qtd)

        .slice(0, 10);


    // =================================
    // LOTAÇÕES
    // =================================

    Plotly.react(

        "g1",

        [{
            x: lotTop.map(x => x.lotacao),
            y: lotTop.map(x => x.qtd),
            type: "bar"
        }],

        {
            title: "Top 10 Lotações",
            margin: { t: 50 }
        }
    );


    // =================================
    // CURSOS
    // =================================

    Plotly.react(

        "g2",

        [{
            x: cursoTop.map(x => x.formacao),
            y: cursoTop.map(x => x.qtd),
            type: "bar"
        }],

        {
            title: "Top 10 Cursos",
            margin: { t: 50 }
        }
    );


    // =================================
    // PERÍODO
    // =================================

    Plotly.react(

        "g3",

        [{
            x: data.periodo.map(x => x.mes),
            y: data.periodo.map(x => x.qtd),
            type: "scatter",
            mode: "lines+markers"
        }],

        {
            title: "Participações por Mês",
            margin: { t: 50 }
        }
    );


    // =================================
    // CERTIFICAÇÃO
    // =================================

    Plotly.react(

        "g4",

        [{
            labels: [
                "Certificados",
                "Evasão"
            ],

            values: [
                data.cards?.certificados || 0,
                data.cards?.evasao || 0
            ],

            type: "pie"
        }],

        {
            title: "Conclusão x Evasão"
        }
    );


    // =================================
    // EIXOS
    // =================================

    Plotly.react(

        "g5",

        [{
            x: data.eixo.map(x => x.eixo),
            y: data.eixo.map(x => x.qtd),
            type: "bar"
        }],

        {
            title: "Participações por Eixo",
            margin: { t: 50 }
        }
    );
}


// ====================================
// EVENTOS
// ====================================

document.getElementById(
    "filtroLotacao"
).onchange = e => {

    filtros.lotacao = e.target.value;

    carregar();
};

document.getElementById(
    "filtroCurso"
).onchange = e => {

    filtros.curso = e.target.value;

    carregar();
};

document.getElementById(
    "mes_inicio"
).onchange = e => {

    filtros.mes_inicio = e.target.value;
};

document.getElementById(
    "mes_fim"
).onchange = e => {

    filtros.mes_fim = e.target.value;
};


// ====================================
// LIMPAR
// ====================================

window.limparFiltros = function() {

    filtros = {

        mes_inicio: "",

        mes_fim: "",

        lotacao: "",

        curso: ""
    };

    document.getElementById(
        "mes_inicio"
    ).value = "";

    document.getElementById(
        "mes_fim"
    ).value = "";

    document.getElementById(
        "filtroLotacao"
    ).value = "";

    document.getElementById(
        "filtroCurso"
    ).value = "";

    carregar();
}

window.carregar = carregar;


// ====================================
// INIT
// ====================================

document.addEventListener(
    "DOMContentLoaded",
    carregar
);

})();
</script>

{% endblock %}
