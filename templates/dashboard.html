{% extends "base.html" %}

{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="/static/js/dashboard.js"></script>

<div id="dashboard">
<h2 class="mb-4">📊 Dashboard de Formações</h2>

<div id="erro" class="alert alert-danger" style="display:none"></div>

<div id="loading" style="display:none;font-weight:bold;">
    Carregando...
</div>

<!-- ===================================== -->
<!-- FILTROS -->
<!-- ===================================== -->

<div class="row mb-4">

    <div class="col-md-2">
        <label class="form-label">Mês Inicial</label>
        <input type="month" id="mes_inicio" class="form-control">
    </div>

    <div class="col-md-2">
        <label class="form-label">Mês Final</label>
        <input type="month" id="mes_fim" class="form-control">
    </div>

    <div class="col-md-2">
        <label class="form-label">Lotação</label>
        <select id="filtroLotacao" class="form-control">
            <option value="">Todas</option>
        </select>
    </div>

    <div class="col-md-2">
        <label class="form-label">Curso</label>
        <select id="filtroCurso" class="form-control">
            <option value="">Todos</option>
        </select>
    </div>

    <div class="col-md-2">
        <label class="form-label">Eixo</label>
        <select id="filtroEixo" class="form-control">
            <option value="">Todos</option>
        </select>
    </div>

    <div class="col-auto px-1 d-flex align-items-end">
        <button onclick="carregar()" class="btn btn-dark w-100">OK</button>
    </div>

    <div class="col-auto px-1 d-flex align-items-end">
        <button onclick="limparFiltros()" class="btn btn-secondary w-100">⟲</button>
    </div>

    <div class="col-auto px-1 d-flex align-items-end">
        <button onclick="exportarPDF()" class="btn btn-primary w-100" >PDF</button>        
    </div>

</div>

<!-- ===================================== -->
<!-- CARDS -->
<!-- ===================================== --> 

<div class="row mb-4">

    <div class="col-md-2"><div class="card shadow-sm text-center h-100"><div class="card-body p-2"><h6>Participações</h6><h2 id="total">0</h2></div></div></div>

    <div class="col-md-2"><div class="card shadow-sm text-center h-100"><div class="card-body p-2"><h6>Certificados</h6><h2 id="certificados">0</h2></div></div></div>

    <div class="col-md-1"><div class="card shadow-sm text-center h-100"><div class="card-body p-2"><h6>Matrículas</h6><h2 id="servidoresUnicos">0</h2></div></div></div>

    <div class="col-md-2"><div class="card shadow-sm text-center h-100"><div class="card-body p-2"><h6>Evasão</h6><h2 id="evasao">0</h2></div></div></div>

    <div class="col-md-2"><div class="card shadow-sm text-center h-100"><div class="card-body p-2"><h6>Taxa Evasão</h6><h2 id="taxaEvasao">0%</h2></div></div></div>

    <div class="col-md-2"><div class="card shadow-sm text-center h-100"><div class="card-body p-2"><h6>Carga Horária</h6><h2 id="cargaRealizada">0h</h2></div></div></div>

    <div class="col-md-1"><div class="card shadow-sm text-center h-100"><div class="card-body p-2"><h6>Média</h6><h2 id="mediaServidor">0</h2></div></div></div>

</div>

<!-- ===================================== -->
<!-- GRÁFICOS -->
<!-- ===================================== -->
<style>
    #g1, #g2{
        height: 350px;
    }    
    #g4,  {
        height: 280px;
    }

    #g5, #g7, #g8 {
        height: 300px;
    }
</style>

<div class="row">
    <div class="col-md-6 mb-4"><div class="card shadow-sm"><div class="card-body"><div id="g1"></div></div></div></div>
    <div class="col-md-6 mb-4"><div class="card shadow-sm"><div class="card-body"><div id="g2"></div></div></div></div>
</div>

<div class="row">
    <div class="col-md-6 mb-4"><div class="card shadow-sm"><div class="card-body"><div id="g4"></div></div></div></div>    
</div>

<div class="row">
    <div class="col-md-6 mb-4"><div class="card shadow-sm"><div class="card-body"><div id="g5"></div></div></div></div>
</div>

<div class="row">
    <div class="col-md-12 mb-4"><div class="card shadow-sm"><div class="card-body"><div id="g7"></div></div></div></div>
</div>
</div>

<script>

(() => {

let filtros = {
    mes_inicio: "",
    mes_fim: "",
    lotacao: "",
    curso: "",
    eixo: ""
};

async function exportarPDF() {

    const { jsPDF } = window.jspdf;

    let dashboard =
        document.getElementById("dashboard");

    window.dispatchEvent(
        new Event("resize")
    );

    await new Promise(
        resolve => setTimeout(resolve,500)
    );

    let canvas = await html2canvas(
        dashboard,
        {
            scale:2,
            useCORS:true,
            backgroundColor:"#ffffff",
            scrollY:-window.scrollY
        }
    );

    let pdf = new jsPDF(
        "p",
        "mm",
        "a4"
    );

    let larguraPDF =
        pdf.internal.pageSize.getWidth();

    let alturaPagina =
        pdf.internal.pageSize.getHeight();

    let margemTopo=20;
    let margemInferior=10;
    let margemLateral=5;

    let areaUtil=
        alturaPagina-
        margemTopo-
        margemInferior;

    let imgWidth=
        larguraPDF-
        (margemLateral*2);

    let pageHeightPx=
        (canvas.width*
        areaUtil)/
        imgWidth;

    let restante=
        canvas.height;

    let y=0;

    while(restante>0){

        let pageCanvas=
            document.createElement(
                "canvas"
            );

        pageCanvas.width=
            canvas.width;

        pageCanvas.height=
            Math.min(
                pageHeightPx,
                restante
            );

        let ctx=
            pageCanvas.getContext(
                "2d"
            );

        ctx.drawImage(
            canvas,
            0,
            y,
            canvas.width,
            pageCanvas.height,
            0,
            0,
            canvas.width,
            pageCanvas.height
        );

        let pageImg=
            pageCanvas.toDataURL(
                "image/png"
            );

        let alturaAtual=
            (pageCanvas.height*
            imgWidth)/
            pageCanvas.width;

        if(y>0){
            pdf.addPage();
        }

        pdf.setFontSize(14);

        pdf.text(
            "Relatório Dashboard",
            margemLateral,
            10
        );

        pdf.addImage(
            pageImg,
            "PNG",
            margemLateral,
            margemTopo,
            imgWidth,
            alturaAtual
        );

        restante -= pageCanvas.height;
        y += pageCanvas.height;
    }

    pdf.save(
        "dashboard.pdf"
    );
}


function montarURL(){

    return `/api/dashboard?mes_inicio=${encodeURIComponent(filtros.mes_inicio)}`
    +`&mes_fim=${encodeURIComponent(filtros.mes_fim)}`
    +`&lotacao=${encodeURIComponent(filtros.lotacao)}`
    +`&curso=${encodeURIComponent(filtros.curso)}`
    +`&eixo=${encodeURIComponent(filtros.eixo)}`;

}


async function carregar(){

    filtros.mes_inicio=
        document.getElementById(
            "mes_inicio"
        ).value;

    filtros.mes_fim=
        document.getElementById(
            "mes_fim"
        ).value;

    filtros.lotacao=
        document.getElementById(
            "filtroLotacao"
        ).value;

    filtros.curso=
        document.getElementById(
            "filtroCurso"
        ).value;

    filtros.eixo=
        document.getElementById(
            "filtroEixo"
        ).value;

    try{

        document.getElementById(
            "loading"
        ).style.display="block";

        let res=
            await fetch(
                montarURL()
            );

        let data=
            await res.json();

        atualizarCards(data);

        montarGraficos(data);
        await preencherFiltros(data);

    }

    catch(err){

        console.error(err);

    }

    finally{

        document.getElementById(
            "loading"
        ).style.display="none";

    }

}


function atualizarCards(data){

    document.getElementById("total").innerText=data.cards?.participacoes||0;
    document.getElementById("certificados").innerText=data.cards?.certificados||0;
    document.getElementById("servidoresUnicos").innerText=data.cards?.servidores_unicos||0;
    document.getElementById("evasao").innerText=data.cards?.evasao||0;
    document.getElementById("taxaEvasao").innerText=(data.cards?.taxa_evasao||0)+"%";
    document.getElementById("cargaRealizada").innerText=(data.cards?.carga_realizada||0)+"h";
    document.getElementById("mediaServidor").innerText=data.cards?.media_por_servidor||0;

}


async function preencherFiltros(data){
    if(!data){
        return;
    }

    let lotacao =
        document.getElementById(
            "filtroLotacao"
        );

    let curso =
        document.getElementById(
            "filtroCurso"
        );

    let eixo =
        document.getElementById(
            "filtroEixo"
        );


    // ==========================
    // LOTAÇÕES
    // ==========================

    if(lotacao.options.length <= 1){

        let res = await api("/api/dashboard/lotacoes");
        let lista = await res.json();

        lista
        .sort((a,b)=>
        
            (a.tipo || "")
            .localeCompare(
        
                (b.tipo || ""),
                "pt-BR",
                {
                    sensitivity:"base"
                }
        
            )
        
        )

        .forEach(x=>{

            lotacao.add(

                new Option(
                    x.tipo,
                    x.tipo
                )

            );

        });

    }


    // ==========================
    // CURSOS
    // ==========================

    if(curso.options.length <= 1){

        let res = await api("/api/dashboard/cursos");
        let lista = await res.json();

        lista
        .sort((a,b)=>
        
            (a.descricao || "")
            .localeCompare(
        
                (b.descricao || ""),
                "pt-BR",
                {
                    sensitivity:"base"
                }
        
            )
        
        )


        .forEach(x=>{

            curso.add(

                new Option(
                    x.descricao,
                    x.descricao
                )

            );

        });

    }


    
    // ==========================
    // EIXOS
    // ==========================
    
    if(eixo.options.length <= 1){
    
        let res = await api("/api/dashboard/eixos");
        let lista = await res.json();
    
        lista
        .sort((a,b)=>
    
            (a.eixo || "")
            .localeCompare(
    
                (b.eixo || ""),
                "pt-BR",
                {
                    sensitivity:"base"
                }
    
            )
    
        )
    
        .forEach(x=>{
    
            eixo.add(
    
                new Option(
                    x.eixo,
                    x.eixo
                )
    
            );
    
        });
    
    }

}


function limparFiltros(){

    document.getElementById("mes_inicio").value="";
    document.getElementById("mes_fim").value="";
    document.getElementById("filtroLotacao").value="";
    document.getElementById("filtroCurso").value="";
    document.getElementById("filtroEixo").value="";

    filtros={

        mes_inicio:"",
        mes_fim:"",
        lotacao:"",
        curso:"",
        eixo:""

    };

    carregar();

}


function montarGraficos(data){

    // ==========================
    // Top Lotações
    // ==========================

    const g1 = document.getElementById("g1");

    const lotacoes = Array.isArray(data.lotacao)
    ? data.lotacao
    : (data.lotacao ? [data.lotacao] : []);

    if (lotacoes.length > 1) {
        
            g1.style.display = "block";
            g1.style.visibility = "visible";
            g1.style.height = "400px";
            
            Plotly.react("g1", [{
        
                x: lotacoes.map(x => x.lotacao),
        
                y: lotacoes.map(x => Number(x.qtd || 0)),
        
                type: "bar"
        
            }], {
        
                title: "Lotações"
        
            });
        
            setTimeout(() => {
                Plotly.Plots.resize(g1);
            }, 100);
        
    } else {
        
            g1.style.visibility = "hidden";
            g1.style.height = "0px";
    }


    

    // ==========================
    // Top Cursos
    // ==========================
    
    const g2 = document.getElementById("g2");
    
    const cursos = Array.isArray(data.curso)
        ? data.curso
        : (data.curso ? [data.curso] : []);
    
    if (cursos.length > 1) {
    
        g2.style.visibility = "visible";
        g2.style.height = "400px";
        g2.style.display = "block";
    
        Plotly.react("g2", [{
    
            x: cursos.map(
                x => x.formacao
            ),
    
            y: cursos.map(
                x => Number(x.qtd || 0)
            ),
    
            type: "bar"
    
        }], {
    
            title: "Cursos"
    
        });
    
        setTimeout(() => {
            Plotly.Plots.resize(g2);
        }, 100);
    
    } else {
    
        g2.style.visibility = "hidden";
        g2.style.height = "0px";
        g2.innerHTML = "";
    }

    // ==========================
    // Certificados x evasão
    // ==========================

    Plotly.react("g4",[{

        labels:[
            "Certificados",
            "Evasão"
        ],

        values:[

            data.cards?.certificados || 0,

            data.cards?.evasao || 0

        ],

        type:"pie"
        height = "250px";
    }],{

        title:"Certiicados x Evasão"

    });


    // ==========================
    // Eixos
    // ==========================

    if (data.eixo) {

        Plotly.react("g5", [{
    
            labels: data.eixo.map(
                x => x.eixo
            ),
    
            values: data.eixo.map(
                x => x.qtd
            ),
    
            type: "pie",
            textinfo: "label+percent+value",
            hoverinfo: "label+percent+value"
            height = "400px";
            
    
        }], {
    
            title: "Participações por Eixo"
    
        });
    
    }



    // ==========================
    // Comparativo anual
    // ==========================

    if((data.anual || []).length>0){

        document.getElementById(
            "g7"
        ).style.display="block";

        Plotly.react("g7",[{

            x:data.anual.map(
                x=>x.ano
            ),

            y:data.anual.map(
                x=>x.qtd
            ),

            type:"scatter",

            mode:"lines+markers"

        }],{

            title:"Comparativo Anual"

        });

    }else{

        document.getElementById(
            "g7"
        ).style.display="none";

        document.getElementById(
            "g7"
        ).innerHTML="";
    }

}


window.carregar=carregar;
window.exportarPDF=exportarPDF;
window.limparFiltros=limparFiltros;


document.addEventListener(
    "DOMContentLoaded",
    async()=>{

        await carregar();

    }
);

})();

</script>

  

{% endblock %}
