{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">
    📊 Dashboard de Formações
</h2>

<div class="row mb-4">

    <div class="col-md-2">

        <input type="month"
               id="mes_inicio"
               class="form-control">

    </div>

    <div class="col-md-2">

        <input type="month"
               id="mes_fim"
               class="form-control">

    </div>

    <div class="col-md-2">

        <select id="filtroLotacao"
                class="form-control">

            <option value="">
                Todas Lotações
            </option>

        </select>

    </div>

    <div class="col-md-2">

        <select id="filtroCurso"
                class="form-control">

            <option value="">
                Todos Cursos
            </option>

        </select>

    </div>

    <div class="col-md-2">

        <select id="filtroEixo"
                class="form-control">

            <option value="">
                Todos Eixos
            </option>

        </select>

    </div>

    <div class="col-md-1">

        <button onclick="carregar()"
                class="btn btn-dark w-100">

            OK

        </button>

    </div>

    <div class="col-md-1">

        <button onclick="limparFiltros()"
                class="btn btn-secondary w-100">

            ⟲

        </button>

    </div>

</div>


<!-- ===================================== -->
<!-- CARDS -->
<!-- ===================================== -->

<div class="row mb-4">

    <div class="col-md-2">

        <div class="card shadow-sm">

            <div class="card-body text-center">

                <h6>Participações</h6>

                <h2 id="total">0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-2">

        <div class="card shadow-sm">

            <div class="card-body text-center">

                <h6>Certificados</h6>

                <h2 id="certificados">0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-2">

        <div class="card shadow-sm">

            <div class="card-body text-center">

                <h6>Evasão</h6>

                <h2 id="evasao">0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-2">

        <div class="card shadow-sm">

            <div class="card-body text-center">

                <h6>Taxa Evasão</h6>

                <h2 id="taxaEvasao">0%</h2>

            </div>

        </div>

    </div>

    <div class="col-md-2">

        <div class="card shadow-sm">

            <div class="card-body text-center">

                <h6>Carga Horária</h6>

                <h2 id="cargaRealizada">0h</h2>

            </div>

        </div>

    </div>

    <div class="col-md-2">

        <div class="card shadow-sm">

            <div class="card-body text-center">

                <h6>Média</h6>

                <h2 id="mediaServidor">0</h2>

            </div>

        </div>

    </div>

</div>


<!-- ===================================== -->
<!-- GRÁFICOS -->
<!-- ===================================== -->

<div class="row">

    <div class="col-md-6 mb-4">

        <div class="card shadow-sm">

            <div class="card-body">

                <div id="g1"></div>

            </div>

        </div>

    </div>

    <div class="col-md-6 mb-4">

        <div class="card shadow-sm">

            <div class="card-body">

                <div id="g2"></div>

            </div>

        </div>

    </div>

</div>


<div class="row">

    <div class="col-md-12 mb-4">

        <div class="card shadow-sm">

            <div class="card-body">

                <div id="g3"></div>

            </div>

        </div>

    </div>

</div>


<div class="row">

    <div class="col-md-6 mb-4">

        <div class="card shadow-sm">

            <div class="card-body">

                <div id="g4"></div>

            </div>

        </div>

    </div>

    <div class="col-md-6 mb-4">

        <div class="card shadow-sm">

            <div class="card-body">

                <div id="g5"></div>

            </div>

        </div>

    </div>

</div>


<div class="row">

    <div class="col-md-12 mb-4">

        <div class="card shadow-sm">

            <div class="card-body">

                <div id="g6"></div>

            </div>

        </div>

    </div>

</div>


<div class="row">

    <div class="col-md-12 mb-4">

        <div class="card shadow-sm">

            <div class="card-body">

                <div id="g7"></div>

            </div>

        </div>

    </div>

</div>


<script>

let filtros = {

    mes_inicio: "",

    mes_fim: "",

    lotacao: "",

    curso: "",

    eixo: ""
};


// =====================================
// URL
// =====================================

function montarURL() {

    return (

        `/api/dashboard?` +

        `mes_inicio=${filtros.mes_inicio}` +

        `&mes_fim=${filtros.mes_fim}` +

        `&lotacao=${filtros.lotacao}` +

        `&curso=${filtros.curso}` +

        `&eixo=${filtros.eixo}`
    );
}


// =====================================
// CARREGAR
// =====================================

async function carregar() {

    let res = await api(
        montarURL()
    );

    let data = await res.json();

    atualizarCards(data);

    preencherFiltros(data);

    montarGraficos(data);
}


// =====================================
// CARDS
// =====================================

function atualizarCards(data) {

    document.getElementById("total").innerText =
        data.cards.participacoes;

    document.getElementById("certificados").innerText =
        data.cards.certificados;

    document.getElementById("evasao").innerText =
        data.cards.evasao;

    document.getElementById("taxaEvasao").innerText =
        data.cards.taxa_evasao + "%";

    document.getElementById("cargaRealizada").innerText =
        data.cards.carga_realizada + "h";

    document.getElementById("mediaServidor").innerText =
        data.cards.media_por_servidor;
}


// =====================================
// FILTROS
// =====================================

function preencherFiltros(data) {

    let eixo = document.getElementById(
        "filtroEixo"
    );

    eixo.innerHTML =
        '<option value="">Todos Eixos</option>';

    data.eixo.forEach(x => {

        let opt = new Option(
            x.eixo,
            x.eixo
        );

        eixo.add(opt);
    });
}


// =====================================
// GRÁFICOS
// =====================================

function montarGraficos(data) {

    // ============================
    // LOTAÇÃO
    // ============================

    Plotly.react(

        "g1",

        [{
            x: data.lotacao.map(x => x.lotacao),
            y: data.lotacao.map(x => x.qtd),
            type: "bar"
        }],

        {
            title: "Top Lotações"
        }
    );


    // ============================
    // CURSOS
    // ============================

    Plotly.react(

        "g2",

        [{
            x: data.curso.map(x => x.formacao),
            y: data.curso.map(x => x.qtd),
            type: "bar"
        }],

        {
            title: "Top Cursos"
        }
    );


    // ============================
    // PERÍODO
    // ============================

    Plotly.react(

        "g3",

        [{
            x: data.periodo.map(x => x.mes),
            y: data.periodo.map(x => x.qtd),
            type: "scatter",
            mode: "lines+markers"
        }],

        {
            title: "Participações por Mês"
        }
    );


    // ============================
    // CERTIFICAÇÃO
    // ============================

    Plotly.react(

        "g4",

        [{
            labels: [
                "Certificados",
                "Evasão"
            ],

            values: [
                data.cards.certificados,
                data.cards.evasao
            ],

            type: "pie"
        }],

        {
            title: "Conclusão x Evasão"
        }
    );


    // ============================
    // EIXOS
    // ============================

    Plotly.react(

        "g5",

        [{
            x: data.eixo.map(x => x.eixo),
            y: data.eixo.map(x => x.qtd),
            type: "bar"
        }],

        {
            title: "Participações por Eixo"
        }
    );


    // ============================
    // PERÍODO X EIXO
    // ============================

    let eixos = [

        ...new Set(
            data.periodo_eixo.map(
                x => x.eixo
            )
        )
    ];

    let traces = eixos.map(eixo => {

        let dados = data.periodo_eixo
            .filter(x => x.eixo === eixo);

        return {

            x: dados.map(x => x.mes),

            y: dados.map(x => x.qtd),

            name: eixo,

            type: "bar"
        };
    });

    Plotly.react(

        "g6",

        traces,

        {

            barmode: "stack",

            title: "Participações por Mês e Eixo"
        }
    );


    // ============================
    // ANUAL
    // ============================

    Plotly.react(

        "g7",

        [{

            x: data.anual.map(x => x.ano),

            y: data.anual.map(x => x.qtd),

            type: "scatter",

            mode: "lines+markers"
        }],

        {
            title: "Comparativo Anual"
        }
    );
}


// =====================================
// EVENTOS
// =====================================

document.getElementById(
    "filtroEixo"
).onchange = e => {

    filtros.eixo = e.target.value;

    carregar();
};


// =====================================
// LIMPAR
// =====================================

function limparFiltros() {

    filtros = {

        mes_inicio: "",

        mes_fim: "",

        lotacao: "",

        curso: "",

        eixo: ""
    };

    carregar();
}


document.addEventListener(

    "DOMContentLoaded",

    carregar
);

</script>

{% endblock %}
