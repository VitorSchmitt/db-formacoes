{% extends "base.html" %}

{% block content %}

<h2>Dashboard</h2>

<div class="row mb-4">
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h5>Total</h5>
                <h2 id="total"></h2>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div id="g1"></div>
    </div>
    <div class="col-md-6">
        <div id="g2"></div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-12">
        <div id="g3"></div>
    </div>
</div>

<script>
async function carregar() {
    let res = await fetch("/api/dashboard");
    let data = await res.json();

    document.getElementById("total").innerText = data.total;

    Plotly.newPlot("g1", [{
        x: data.lotacao.map(x => x.lotacao),
        y: data.lotacao.map(x => x.qtd),
        type: "bar"
    }], {title: "Por Lotação"});

    Plotly.newPlot("g2", [{
        x: data.curso.map(x => x.formacao),
        y: data.curso.map(x => x.qtd),
        type: "bar"
    }], {title: "Por Curso"});

    Plotly.newPlot("g3", [{
        x: data.periodo.map(x => x.mes),
        y: data.periodo.map(x => x.qtd),
        type: "scatter"
    }], {title: "Por Período"});
}

carregar();
</script>

{% endblock %}
