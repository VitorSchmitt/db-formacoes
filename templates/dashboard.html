{% extends "base.html" %}

{% block content %}

<h2 class="mb-3">📊 Dashboard de Formações</h2>

<div id="erro" class="alert alert-danger" style="display:none"></div>
<div id="loading" style="display:none; font-weight:bold;">Carregando...</div>

<!-- FILTROS -->
<div class="row mb-3">
    <div class="col-md-2">
        <input type="month" id="mes_inicio" class="form-control">
    </div>
    <div class="col-md-2">
        <input type="month" id="mes_fim" class="form-control">
    </div>
    <div class="col-md-3">
        <select id="filtroLotacao" class="form-control"></select>
    </div>
    <div class="col-md-3">
        <select id="filtroCurso" class="form-control"></select>
    </div>
    <div class="col-md-1">
        <button onclick="carregar()" class="btn btn-dark w-100">OK</button>
    </div>
    <div class="col-md-1">
        <button onclick="limparFiltros()" class="btn btn-secondary w-100">⟲</button>
    </div>
</div>

<!-- CARDS -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card text-white bg-primary text-center">
            <div class="card-body">
                <h6>Total</h6>
                <h2 id="total"></h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-white bg-success text-center">
            <div class="card-body">
                <h6>Cursos</h6>
                <h2 id="totalCursos"></h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-dark bg-warning text-center">
            <div class="card-body">
                <h6>Lotações</h6>
                <h2 id="totalLotacoes"></h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-white bg-dark text-center">
            <div class="card-body">
                <h6>Média Mensal</h6>
                <h2 id="media"></h2>
            </div>
        </div>
    </div>
</div>

<!-- GRÁFICOS -->
<div class="row">
    <div class="col-md-6"><div id="g1"></div></div>
    <div class="col-md-6"><div id="g2"></div></div>
</div>

<div class="row mt-4">
    <div class="col-md-12"><div id="g3"></div></div>
</div>

<script>
(() => {

// ===============================
// ESTADO GLOBAL
// ===============================
let filtros = {
    mes_inicio: "",
    mes_fim: "",
    lotacao: "",
    curso: ""
};

// ===============================
// CARREGAR DADOS
// ===============================
async function carregar() {

    try {
        document.getElementById("loading").style.display = "block";
        document.getElementById("erro").style.display = "none";

        let url = `/api/dashboard?mes_inicio=${filtros.mes_inicio}&mes_fim=${filtros.mes_fim}&lotacao=${filtros.lotacao}&curso=${filtros.curso}`;

        let res = await api(url); // 🔥 CORREÇÃO PRINCIPAL

        // 🔴 erro de autenticação
        if (res.status === 401) {
            localStorage.clear();
            window.location.href = "/";
            return;
        }

        let data = await res.json();

        document.getElementById("loading").style.display = "none";

        if (data.erro) {
            mostrarErro(data.erro);
            return;
        }

        atualizarCards(data);
        preencherFiltros(data);
        montarGraficos(data);

    } catch (err) {
        console.error(err);
        mostrarErro("Erro ao carregar dashboard");
    }
}

// ===============================
// CARDS
// ===============================
function atualizarCards(data) {

    document.getElementById("total").innerText = data.total || 0;
    document.getElementById("totalCursos").innerText = data.curso?.length || 0;
    document.getElementById("totalLotacoes").innerText = data.lotacao?.length || 0;

    let soma = data.periodo.reduce((acc, x) => acc + x.qtd, 0);
    let media = soma / (data.periodo.length || 1);

    document.getElementById("media").innerText = media.toFixed(1);
}

// ===============================
// FILTROS
// ===============================
function preencherFiltros(data) {

    let lot = document.getElementById("filtroLotacao");
    let curso = document.getElementById("filtroCurso");

    lot.innerHTML = '<option value="">Todas Lotações</option>';
    curso.innerHTML = '<option value="">Todos Cursos</option>';

    data.lotacao.forEach(x => {
        let opt = new Option(x.lotacao, x.lotacao);
        if (x.lotacao === filtros.lotacao) opt.selected = true;
        lot.add(opt);
    });

    data.curso.forEach(x => {
        let opt = new Option(x.formacao, x.formacao);
        if (x.formacao === filtros.curso) opt.selected = true;
        curso.add(opt);
    });
}

// ===============================
// GRÁFICOS
// ===============================
function montarGraficos(data) {

    let lotTop = data.lotacao.sort((a,b)=>b.qtd-a.qtd).slice(0,10);
    let cursoTop = data.curso.sort((a,b)=>b.qtd-a.qtd).slice(0,10);

    Plotly.react("g1", [{
        x: lotTop.map(x => x.lotacao),
        y: lotTop.map(x => x.qtd),
        type: "bar"
    }], {title: "Top Lotações"});

    document.getElementById("g1").on('plotly_click', d => {
        let val = d.points[0].x;
        filtros.lotacao = (filtros.lotacao === val) ? "" : val;
        carregar();
    });

    Plotly.react("g2", [{
        x: cursoTop.map(x => x.formacao),
        y: cursoTop.map(x => x.qtd),
        type: "bar"
    }], {title: "Top Cursos"});

    document.getElementById("g2").on('plotly_click', d => {
        let val = d.points[0].x;
        filtros.curso = (filtros.curso === val) ? "" : val;
        carregar();
    });

    Plotly.react("g3", [{
        x: data.periodo.map(x => x.mes),
        y: data.periodo.map(x => x.qtd),
        type: "scatter"
    }], {title: "Participações por Mês"});
}

// ===============================
// EVENTOS
// ===============================
document.getElementById("filtroLotacao").onchange = e => {
    filtros.lotacao = e.target.value;
    carregar();
};

document.getElementById("filtroCurso").onchange = e => {
    filtros.curso = e.target.value;
    carregar();
};

document.getElementById("mes_inicio").onchange = e => {
    filtros.mes_inicio = e.target.value;
};

document.getElementById("mes_fim").onchange = e => {
    filtros.mes_fim = e.target.value;
};

// ===============================
// LIMPAR
// ===============================
function limparFiltros() {

    filtros = { mes_inicio:"", mes_fim:"", lotacao:"", curso:"" };

    document.getElementById("mes_inicio").value = "";
    document.getElementById("mes_fim").value = "";

    carregar();
}

// ===============================
// UI
// ===============================
function mostrarErro(msg) {
    let div = document.getElementById("erro");
    div.innerText = msg;
    div.style.display = "block";
}

// INIT
document.addEventListener("DOMContentLoaded", carregar);

})();
</script>

{% endblock %}
