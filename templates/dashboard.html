{% extends "base.html" %}

{% block content %}

<h2 class="mb-3">📊 Dashboard de Formações</h2>

<!-- ALERTA ERRO -->
<div id="erro" class="alert alert-danger" style="display:none"></div>

<!-- LOADING -->
<div id="loading" style="display:none; font-weight:bold;">Carregando...</div>

<!-- FILTROS -->
<div class="row mb-3">
    <div class="col-md-2">
        <input type="month" id="mes_inicio" class="form-control" min="2022-01" max="2030-12">
    </div>
    <div class="col-md-2">
        <input type="month" id="mes_fim" class="form-control" min="2022-01" max="2030-12">
    </div>
    <div class="col-md-3">
        <select id="filtroLotacao" class="form-control"></select>
    </div>
    <div class="col-md-3">
        <select id="filtroCurso" class="form-control"></select>
    </div>
    <div class="col-md-1">
        <button onclick="carregar()" class="btn btn-dark w-100">OK</button>
    </div>
    <div class="col-md-1">
        <button onclick="limparFiltros()" class="btn btn-secondary w-100">⟲</button>
    </div>
</div>

<!-- CARDS -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card text-white bg-primary text-center">
            <div class="card-body">
                <h6>Total</h6>
                <h2 id="total"></h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-white bg-success text-center">
            <div class="card-body">
                <h6>Cursos</h6>
                <h2 id="totalCursos"></h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-dark bg-warning text-center">
            <div class="card-body">
                <h6>Lotações</h6>
                <h2 id="totalLotacoes"></h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-white bg-dark text-center">
            <div class="card-body">
                <h6>Média Mensal</h6>
                <h2 id="media"></h2>
            </div>
        </div>
    </div>
</div>

<!-- GRÁFICOS -->
<div class="row">
    <div class="col-md-6"><div id="g1"></div></div>
    <div class="col-md-6"><div id="g2"></div></div>
</div>

<div class="row mt-4">
    <div class="col-md-12"><div id="g3"></div></div>
</div>

<script>

// ===============================
// ESTADO GLOBAL
// ===============================
let filtros = {
    mes_inicio: "",
    mes_fim: "",
    lotacao: "",
    curso: ""
};

// ===============================
// CARREGAR DADOS
// ===============================
async function carregar() {

    document.getElementById("loading").style.display = "block";
    document.getElementById("erro").style.display = "none";

    let url = `/api/dashboard?mes_inicio=${filtros.mes_inicio}&mes_fim=${filtros.mes_fim}&lotacao=${filtros.lotacao}&curso=${filtros.curso}`;

    let res = await fetch(url);
    let data = await res.json();

    document.getElementById("loading").style.display = "none";

    if (data.erro) {
        let div = document.getElementById("erro");
        div.innerText = data.erro;
        div.style.display = "block";
        return;
    }

    atualizarCards(data);
    preencherFiltros(data);
    montarGraficos(data);
}

// ===============================
// CARDS
// ===============================
function atualizarCards(data) {

    document.getElementById("total").innerText = data.total;
    document.getElementById("totalCursos").innerText = data.curso.length;
    document.getElementById("totalLotacoes").innerText = data.lotacao.length;

    let soma = data.periodo.reduce((acc, x) => acc + x.qtd, 0);
    let media = soma / (data.periodo.length || 1);

    document.getElementById("media").innerText = media.toFixed(1);
}

// ===============================
// FILTROS (SELECT)
// ===============================
function preencherFiltros(data) {

    let selectLotacao = document.getElementById("filtroLotacao");
    let selectCurso = document.getElementById("filtroCurso");

    let atualLot = filtros.lotacao;
    let atualCurso = filtros.curso;

    selectLotacao.innerHTML = '<option value="">Todas Lotações</option>';
    selectCurso.innerHTML = '<option value="">Todos Cursos</option>';

    data.lotacao.forEach(item => {
        let val = item.lotacao.trim();
        let opt = new Option(val, val);
        if (val === atualLot) opt.selected = true;
        selectLotacao.add(opt);
    });

    data.curso.forEach(item => {
        let val = item.formacao.trim();
        let opt = new Option(val, val);
        if (val === atualCurso) opt.selected = true;
        selectCurso.add(opt);
    });
}

// ===============================
// GRÁFICOS
// ===============================
function montarGraficos(data) {

    let lotTop = data.lotacao.sort((a,b)=>b.qtd-a.qtd).slice(0,10);
    let cursoTop = data.curso.sort((a,b)=>b.qtd-a.qtd).slice(0,10);

    // LOTAÇÃO
    Plotly.react("g1", [{
        x: lotTop.map(x => x.lotacao),
        y: lotTop.map(x => x.qtd),
        type: "bar",
        marker: {
            color: lotTop.map(x =>
                x.lotacao === filtros.lotacao ? "red" : "#007bff"
            )
        }
    }], {title: "Top Lotações"});

    document.getElementById("g1").onclick = (d) => {
        let ponto = d.target.__data__;
    };

    document.getElementById("g1").on('plotly_click', function(d) {
        let valor = d.points[0].x;
        filtros.lotacao = (filtros.lotacao === valor) ? "" : valor;
        carregar();
    });

    // CURSO
    Plotly.react("g2", [{
        x: cursoTop.map(x => x.formacao),
        y: cursoTop.map(x => x.qtd),
        type: "bar",
        marker: {
            color: cursoTop.map(x =>
                x.formacao === filtros.curso ? "red" : "#28a745"
            )
        }
    }], {title: "Top Cursos"});

    document.getElementById("g2").on('plotly_click', function(d) {
        let valor = d.points[0].x;
        filtros.curso = (filtros.curso === valor) ? "" : valor;
        carregar();
    });

    // PERÍODO
    Plotly.react("g3", [{
        x: data.periodo.map(x => x.mes),
        y: data.periodo.map(x => x.qtd),
        type: "scatter"
    }], {title: "Participações por Mês"});

    document.getElementById("g3").on('plotly_click', function(d) {
        let mes = d.points[0].x;
        filtros.mes_inicio = mes;
        filtros.mes_fim = mes;
        carregar();
    });
}

// ===============================
// EVENTOS INPUT
// ===============================
document.getElementById("filtroLotacao").addEventListener("change", e => {
    filtros.lotacao = e.target.value;
    carregar();
});

document.getElementById("filtroCurso").addEventListener("change", e => {
    filtros.curso = e.target.value;
    carregar();
});

document.getElementById("mes_inicio").addEventListener("change", e => {
    filtros.mes_inicio = e.target.value;
});

document.getElementById("mes_fim").addEventListener("change", e => {
    filtros.mes_fim = e.target.value;
});

// ===============================
// LIMPAR FILTROS
// ===============================
function limparFiltros() {

    filtros = {
        mes_inicio: "",
        mes_fim: "",
        lotacao: "",
        curso: ""
    };

    document.getElementById("mes_inicio").value = "";
    document.getElementById("mes_fim").value = "";
    document.getElementById("filtroLotacao").value = "";
    document.getElementById("filtroCurso").value = "";

    carregar();
}

// INIT
carregar();

</script>

{% endblock %}
