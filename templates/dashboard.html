<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; padding: 20px; }
        .filtros { margin-bottom: 20px; }
        canvas { max-width: 600px; margin-bottom: 40px; }
    </style>
</head>
<body>

<h2>Dashboard</h2>

<div class="filtros">
    Início: <input type="month" id="mes_inicio">
    Fim: <input type="month" id="mes_fim">
    <button onclick="carregar()">Filtrar</button>
</div>

<h3>Total: <span id="total"></span></h3>

<canvas id="graficoLotacao"></canvas>
<canvas id="graficoCurso"></canvas>
<canvas id="graficoPeriodo"></canvas>

<script>
let grafico1, grafico2, grafico3;

async function carregar() {
    const inicio = document.getElementById("mes_inicio").value;
    const fim = document.getElementById("mes_fim").value;

    const res = await fetch(`/api/dashboard?mes_inicio=${inicio}&mes_fim=${fim}`, {
    credentials: "include"
    });

    if (!res.ok) {
        console.error("Erro API:", res.status);
        return;
    }

     const data = await res.json();

    document.getElementById("total").innerText = data.total;

    // limpa gráficos antigos
    if (grafico1) grafico1.destroy();
    if (grafico2) grafico2.destroy();
    if (grafico3) grafico3.destroy();

    // 📊 LOTAÇÃO
    grafico1 = new Chart(document.getElementById("graficoLotacao"), {
        type: "bar",
        data: {
            labels: data.lotacao.map(x => x.nome),
            datasets: [{
                label: "Por Lotação",
                data: data.lotacao.map(x => x.qtd)
            }]
        }
    });

    // 📊 CURSO
    grafico2 = new Chart(document.getElementById("graficoCurso"), {
        type: "bar",
        data: {
            labels: data.curso.map(x => x.nome),
            datasets: [{
                label: "Por Curso",
                data: data.curso.map(x => x.qtd)
            }]
        }
    });

    // 📊 PERÍODO
    grafico3 = new Chart(document.getElementById("graficoPeriodo"), {
        type: "line",
        data: {
            labels: data.periodo.map(x => x.mes),
            datasets: [{
                label: "Evolução",
                data: data.periodo.map(x => x.qtd)
            }]
        }
    });
}

// carrega ao abrir
carregar();
</script>

</body>
</html>
