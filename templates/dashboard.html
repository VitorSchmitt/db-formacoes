{% extends "base.html" %}

{% block content %}

<h2>📊 Dashboard de Formações</h2>

<!-- FILTROS -->
<div class="row mb-3">
    <div class="col-md-2">
        <input type="month" id="mes_inicio" class="form-control">
    </div>
    <div class="col-md-2">
        <input type="month" id="mes_fim" class="form-control">
    </div>
    <div class="col-md-3">
        <select id="filtroLotacao" class="form-control"></select>
    </div>
    <div class="col-md-3">
        <select id="filtroCurso" class="form-control"></select>
    </div>
    <div class="col-md-2">
        <button onclick="carregar()" class="btn btn-dark w-100">Filtrar</button>
    </div>
</div>

<!-- CARDS -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card text-white bg-primary text-center">
            <div class="card-body">
                <h5>Total Participações</h5>
                <h2 id="total"></h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-white bg-success text-center">
            <div class="card-body">
                <h5>Total Cursos</h5>
                <h2 id="totalCursos"></h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-dark bg-warning text-center">
            <div class="card-body">
                <h5>Total Lotações</h5>
                <h2 id="totalLotacoes"></h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-white bg-dark text-center">
            <div class="card-body">
                <h5>Média Mensal</h5>
                <h2 id="media"></h2>
            </div>
        </div>
    </div>
</div>

<!-- GRÁFICOS -->
<div class="row">
    <div class="col-md-6"><div id="g1"></div></div>
    <div class="col-md-6"><div id="g2"></div></div>
</div>

<div class="row mt-4">
    <div class="col-md-12"><div id="g3"></div></div>
</div>

<script>
async function carregar() {

    let mes_inicio = document.getElementById("mes_inicio").value;
    let mes_fim = document.getElementById("mes_fim").value;
    let lotacao = document.getElementById("filtroLotacao").value;
    let curso = document.getElementById("filtroCurso").value;

    let url = `/api/dashboard?mes_inicio=${mes_inicio}&mes_fim=${mes_fim}&lotacao=${lotacao}&curso=${curso}`;

    let res = await fetch(url);
    let data = await res.json();

    if (data.erro) {
        alert(data.erro);
        return;
    }

    // CARDS
    document.getElementById("total").innerText = data.total;
    document.getElementById("totalCursos").innerText = data.curso.length;
    document.getElementById("totalLotacoes").innerText = data.lotacao.length;

    let soma = data.periodo.reduce((acc, x) => acc + x.qtd, 0);
    let media = soma / data.periodo.length || 0;
    document.getElementById("media").innerText = media.toFixed(1);

    // FILTROS
    preencherFiltros(data);

    // TOP 10
    let lotTop = data.lotacao.sort((a,b)=>b.qtd-a.qtd).slice(0,10);
    let cursoTop = data.curso.sort((a,b)=>b.qtd-a.qtd).slice(0,10);

    // GRÁFICOS
    Plotly.newPlot("g1", [{
        x: lotTop.map(x => x.lotacao),
        y: lotTop.map(x => x.qtd),
        type: "bar"
    }], {title: "Top 10 Lotações"});

    Plotly.newPlot("g2", [{
        x: cursoTop.map(x => x.formacao),
        y: cursoTop.map(x => x.qtd),
        type: "bar"
    }], {title: "Top 10 Cursos"});

    Plotly.newPlot("g3", [{
        x: data.periodo.map(x => x.mes),
        y: data.periodo.map(x => x.qtd),
        type: "scatter"
    }], {title: "Participações por Mês"});
}


function preencherFiltros(data) {
    let selectLotacao = document.getElementById("filtroLotacao");
    let selectCurso = document.getElementById("filtroCurso");

    selectLotacao.innerHTML = '<option value="">Todas Lotações</option>';
    selectCurso.innerHTML = '<option value="">Todos Cursos</option>';

    data.lotacao.forEach(item => {
        let opt = document.createElement("option");
        opt.value = item.lotacao.trim();
        opt.text = item.lotacao.trim();
        selectLotacao.appendChild(opt);
    });

    data.curso.forEach(item => {
        let opt = document.createElement("option");
        opt.value = item.formacao.trim();
        opt.text = item.formacao.trim();
        selectCurso.appendChild(opt);
    });
}

// INIT
carregar();
</script>

{% endblock %}
