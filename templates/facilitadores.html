{% extends "base.html" %}

{% block content %}

<h2>🎓 Facilitadores da Formação</h2>

<div class="card mb-4">
    <div class="card-body">

        <div class="row">

            <div class="col-md-6">
                <label>Formação</label>

                <select
                    id="formacao"
                    class="form-select"
                    onchange="carregarFacilitadores()"
                >
                </select>
            </div>

        </div>

    </div>
</div>

<div class="card mb-4">
    <div class="card-header">
        Adicionar Facilitador
    </div>

    <div class="card-body">

        <form onsubmit="salvar(event)">

            <input type="hidden" id="servidor">

            <div class="row">

                <div class="col-md-3">

                    <label>Matrícula</label>

                    <input
                        type="text"
                        id="matricula"
                        class="form-control"
                        placeholder="Digite a matrícula"
                        required
                    >

                </div>

                <div class="col-md-6">

                    <label>Servidor</label>

                    <div
                        id="nome_servidor"
                        class="border rounded p-2 bg-light"
                    >
                        Informe a matrícula
                    </div>

                </div>

                <div class="col-md-3 d-flex align-items-end">

                    <button
                        class="btn btn-success w-100"
                        type="submit"
                    >
                        Adicionar
                    </button>

                </div>

            </div>

        </form>

    </div>
</div>

<div class="card">

    <div class="card-header">
        Facilitadores da Formação
    </div>

    <div class="card-body">

        <div class="table-responsive">

            <table class="table table-striped">

                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Nome</th>
                        <th width="120">Ações</th>
                    </tr>
                </thead>

                <tbody id="tabela">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

let timeoutMatricula;

// =====================
// CARREGAR FORMAÇÕES
// =====================
async function carregarFormacoes(){

    let res =
    await api("/api/formacoes");

    let data =
    await res.json();

    let select =
    document.getElementById("formacao");

    select.innerHTML = "";

    (data.dados || data).forEach(f=>{

        select.add(
            new Option(
                f.descricao,
                f.id
            )
        );

    });

    carregarFacilitadores();

}

// =====================
// AUTOCOMPLETE MATRÍCULA
// =====================
const inputMatricula =
document.getElementById("matricula");

if(inputMatricula){

    inputMatricula.addEventListener(
        "input",
        function(){

            clearTimeout(
                timeoutMatricula
            );

            let matricula =
            this.value.trim();

            if(!matricula)
                return;

            timeoutMatricula =
            setTimeout(
                async ()=>{

                    try{

                        let res =
                        await api(
                        `/api/servidores/matricula/${matricula}`
                        );

                        let data =
                        await res.json();

                        let nomeEl =
                        document.getElementById(
                            "nome_servidor"
                        );

                        if(data && data.matricula){

                            document
                            .getElementById(
                                "servidor"
                            )
                            .value =
                            data.matricula;

                            nomeEl.innerHTML = `
                                👤 ${data.nome}<br>
                                Matrícula: ${data.matricula}
                            `;

                        }else{

                            document
                            .getElementById(
                                "servidor"
                            )
                            .value = "";

                            nomeEl.innerHTML = `
                                <span class="text-danger">
                                    Servidor não encontrado
                                </span>
                            `;

                        }

                    }catch(err){

                        console.error(err);

                    }

                },
                400
            );

        }
    );

}

// =====================
// LISTAR
// =====================
async function carregarFacilitadores(){

    let formacao_id =
    document.getElementById(
        "formacao"
    ).value;

    if(!formacao_id)
        return;

    let res =
    await api(
        `/api/facilitador/${formacao_id}`
    );

    let data =
    await res.json();

    let html = "";

    data.forEach(f=>{

        html += `
        <tr>

            <td>${f.matricula}</td>

            <td>${f.nome}</td>

            <td>

                <button
                    class="btn btn-danger btn-sm"
                    onclick="remover(${f.id})"
                >
                    Excluir
                </button>

            </td>

        </tr>
        `;

    });

    document
    .getElementById("tabela")
    .innerHTML = html;

}

// =====================
// SALVAR
// =====================
async function salvar(event){

    event.preventDefault();

    let matricula =
    document.getElementById(
        "servidor"
    ).value;

    let formacao_id =
    document.getElementById(
        "formacao"
    ).value;

    if(!matricula){

        alert(
            "Servidor não encontrado"
        );

        return;

    }

    let res =
    await api(
        "/api/facilitador",
        {
            method:"POST",
            body:JSON.stringify({
                matricula,
                formacao_id
            })
        }
    );

    let r =
    await res.json();

    if(r.erro){

        alert(r.erro);
        return;

    }

    limpar();

    carregarFacilitadores();

}

// =====================
// REMOVER
// =====================
async function remover(id){

    if(
        !confirm(
            "Remover facilitador?"
        )
    )
    return;

    await api(
        `/api/facilitador/${id}`,
        {
            method:"DELETE"
        }
    );

    carregarFacilitadores();

}

// =====================
// LIMPAR
// =====================
function limpar(){

    document
    .getElementById(
        "matricula"
    )
    .value = "";

    document
    .getElementById(
        "servidor"
    )
    .value = "";

    document
    .getElementById(
        "nome_servidor"
    )
    .innerHTML =
    "Informe a matrícula";

}

// =====================
// INIT
// =====================
carregarFormacoes();

</script>

{% endblock %}
