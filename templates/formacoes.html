{% extends "base.html" %}

{% block content %}

<h2>📚 Cadastro de Formação</h2>

<form onsubmit="salvar(event)">

    <!-- ========================= -->
    <!-- LINHA 1 -->
    <!-- ========================= -->
    <div class="row mb-3">

        <div class="col-md-4">
            <input
                type="text"
                id="descricao"
                class="form-control"
                placeholder="Descrição"
                required
            >
        </div>

        <div class="col-md-2">
            <input
                type="date"
                id="data_inicio"
                class="form-control"
            >
        </div>

        <div class="col-md-2">
            <input
                type="date"
                id="data_termino"
                class="form-control"
                required
            >
        </div>

        <div class="col-md-2">
            <input
                type="number"
                id="carga"
                class="form-control"
                placeholder="Carga Horária"
                min="1"
            >
        </div>

    </div>

    <!-- ========================= -->
    <!-- LINHA 2 -->
    <!-- ========================= -->
    <div class="row mb-3">

        <div class="col-md-3">
            <select
                id="modalidade"
                class="form-select"
                required
            ></select>
        </div>

        <div class="col-md-3">
            <input
                type="text"
                id="periodo"
                class="form-control"
                placeholder="Período"
            >
        </div>

        <div class="col-md-3">
            <input
                type="text"
                id="publico_alvo"
                class="form-control"
                placeholder="Público-Alvo"
            >
        </div>

    </div>

    <!-- ========================= -->
    <!-- LINHA 3 -->
    <!-- ========================= -->
    <div class="row mb-3">

        <div class="col-md-3">
            <input
                type="number"
                id="meta_participantes"
                class="form-control"
                placeholder="Meta Participantes"
            >
        </div>

        <div class="col-md-3">
            <input
                type="number"
                step="0.01"
                id="investimento"
                class="form-control"
                placeholder="Investimento"
            >
        </div>

    </div>

    <!-- ========================= -->
    <!-- LINHA 4 -->
    <!-- ========================= -->
    <div class="row mb-3">

        <div class="col-md-4">
            <select
                id="status"
                class="form-select"
            >
                <option value="Planejada">Planejada</option>
                <option value="Em andamento">Em andamento</option>
                <option value="Finalizada">Finalizada</option>
                <option value="Cancelada">Cancelada</option>
                <option value="Em construção">Em construção</option>
            </select>
        </div>

    </div>

    <button class="btn btn-primary">
        Salvar
    </button>

</form>

<div id="msg" class="mt-2"></div>

<hr>

<!-- ========================= -->
<!-- BUSCA -->
<!-- ========================= -->
<div class="row mb-3">

    <div class="col-md-6">
        <input
            type="text"
            id="busca"
            class="form-control"
            placeholder="Buscar..."
            onkeyup="resetarPagina()"
        >
    </div>

    <div class="col-md-2">
        <select
            id="limite"
            class="form-select"
            onchange="resetarPagina()"
        >
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
        </select>
    </div>

</div>

<div id="tabela"></div>

<div class="d-flex justify-content-between mt-3">

    <button class="btn btn-secondary" onclick="anterior()">
        ⬅ Anterior
    </button>

    <span id="pagina_info"></span>

    <button class="btn btn-secondary" onclick="proxima()">
        Próximo ➡
    </button>

</div>

<style>
.table {
    font-size: 0.82rem;
}
</style>

<script>
(() => {

let editandoId = null;
let paginaFormacao = 1;
let totalPaginas = 1;

// ====================================
// ENUMS
// ====================================
async function carregarEnums() {

    try {

        let res = await fetch("/api/enums");
        let data = await res.json();

        let m = document.getElementById("modalidade");

        if (!m) return;

        m.innerHTML = `<option value="">Modalidade</option>`;

        if (Array.isArray(data.modalidade)) {

            data.modalidade.forEach(x =>
                m.add(new Option(x, x))
            );
        }

    } catch (err) {
        console.error("Erro enums:", err);
    }
}

// ====================================
// TOGGLE
// ====================================
window.toggleFormacao = async function(id) {

    try {

        await fetch(`/api/formacoes/toggle/${id}`, {
            method: "PATCH"
        });

        mostrarMsg({
            message: "Status alterado com sucesso"
        });

        carregarTabela();

    } catch (err) {
        console.error(err);
    }
}

// ====================================
// LISTAR
// ====================================
async function carregarTabela() {

    try {

        let busca = document.getElementById("busca").value;
        let limite = document.getElementById("limite").value;

        let url = `/api/formacoes?busca=${busca}&pagina=${paginaFormacao}&limite=${limite}`;

        let res = await fetch(url);
        let data = await res.json();

        if (!data.dados) return;

        let html = `
        <table class="table table-striped table-sm">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Início</th>
                    <th>Término</th>
                    <th>Status</th>
                    <th>Ativa</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
        `;

        data.dados.forEach(f => {

            let ativo = f.ativo ? "🟢" : "🔴";
            let btnTexto = f.ativo ? "Desativar" : "Ativar";
            let btnClasse = f.ativo ? "btn-danger" : "btn-success";

            html += `
            <tr>
                <td>${f.descricao}</td>
                <td>${f.data_inicio || ""}</td>
                <td>${f.data_termino || ""}</td>
                <td>${f.status || ""}</td>
                <td>${ativo}</td>
                <td>
                    <button class="btn btn-sm btn-warning"
                        onclick='editar(${JSON.stringify(f)})'>
                        ✏️
                    </button>

                    <button class="btn btn-sm ${btnClasse}"
                        onclick="toggleFormacao(${f.id})">
                        ${btnTexto}
                    </button>
                </td>
            </tr>
            `;
        });

        html += `</tbody></table>`;

        document.getElementById("tabela").innerHTML = html;

        totalPaginas = data.total_paginas || 1;

        document.getElementById("pagina_info").innerText =
            `Página ${paginaFormacao} de ${totalPaginas}`;

    } catch (err) {
        console.error(err);
    }
}

// ====================================
// PAGINAÇÃO
// ====================================
window.proxima = function() {
    if (paginaFormacao < totalPaginas) {
        paginaFormacao++;
        carregarTabela();
    }
}

window.anterior = function() {
    if (paginaFormacao > 1) {
        paginaFormacao--;
        carregarTabela();
    }
}

window.resetarPagina = function() {
    paginaFormacao = 1;
    carregarTabela();
}

// ====================================
// INIT
// ====================================
document.addEventListener("DOMContentLoaded", () => {
    carregarEnums();
    carregarTabela();
});

})();
</script>

{% endblock %}
