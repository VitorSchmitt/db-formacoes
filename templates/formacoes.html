{% extends "base.html" %}

{% block content %}

<h2>📚 Cadastro de Formação</h2>

<form onsubmit="salvar(event)">

    <!-- ========================= -->
    <!-- LINHA 1 -->
    <!-- ========================= -->
    <div class="row mb-3">

        <div class="col-md-4">
            <input
                type="text"
                id="descricao"
                class="form-control"
                placeholder="Descrição"
                required
            >
        </div>

        <div class="col-md-2">
            <input
                type="date"
                id="data_inicio"
                class="form-control"
            >
        </div>

        <div class="col-md-2">
            <input
                type="date"
                id="data_termino"
                class="form-control"
                required
            >
        </div>

        <div class="col-md-2">
            <input
                type="number"
                id="carga"
                class="form-control"
                placeholder="Carga Horária"
                min="1"
            >
        </div>
       

    </div>

    <!-- ========================= -->
    <!-- LINHA 2 -->
    <!-- ========================= -->
    <div class="row mb-3">

        <div class="col-md-3">
            <select
                id="modalidade"
                class="form-select"
                required
            ></select>
        </div>        

        <div class="col-md-3">
            <input
                type="text"
                id="periodo"
                class="form-control"
                placeholder="Período"
            >
        </div>

        <div class="col-md-3">
            <input
                type="text"
                id="publico_alvo"
                class="form-control"
                placeholder="Público-Alvo"
            >
        </div>

    </div>

    <!-- ========================= -->
    <!-- LINHA 3 -->
    <!-- ========================= -->
    <div class="row mb-3">

        <div class="col-md-3">
            <input
                type="number"
                id="meta_participantes"
                class="form-control"
                placeholder="Meta Participantes"
            >
        </div>

        

        <div class="col-md-3">
            <input
                type="number"
                step="0.01"
                id="investimento"
                class="form-control"
                placeholder="Investimento"
            >
        </div>

    </div>

    <!-- ========================= -->
    <!-- LINHA 4 -->
    <!-- ========================= -->
    <div class="row mb-3">

        <div class="col-md-4">
            <select
                id="status"
                class="form-select"
            >
                <option value="Planejada">Planejada</option>
                <option value="Em andamento">Em andamento</option>
                <option value="Finalizada">Finalizada</option>
                <option value="Cancelada">Cancelada</option>
                <option value="Em construção">Em construção</option>
            </select>
        </div>
    </div>

    <button class="btn btn-primary">
        Salvar
    </button>

</form>

<div id="msg" class="mt-2"></div>

<hr>

<!-- ========================= -->
<!-- BUSCA -->
<!-- ========================= -->
<div class="row mb-3">

    <div class="col-md-6">
        <input
            type="text"
            id="busca"
            class="form-control"
            placeholder="Buscar..."
            onkeyup="resetarPagina()"
        >
    </div>

    <div class="col-md-2">
        <select
            id="limite"
            class="form-select"
            onchange="resetarPagina()"
        >
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
        </select>
    </div>

</div>

<div id="tabela"></div>

<div class="d-flex justify-content-between mt-3">

    <button
        class="btn btn-secondary"
        onclick="anterior()"
    >
        ⬅ Anterior
    </button>

    <span id="pagina_info"></span>

    <button
        class="btn btn-secondary"
        onclick="proxima()"
    >
        Próximo ➡
    </button>

</div>

<style>

.table{
    font-size: 0.82rem;
}

</style>

<script>
(() => {

let editandoId = null;
let paginaFormacao = 1;
let totalPaginas = 1;

// ====================================
// ENUMS
// ====================================
if (!data.modalidade)
    return;

let m = document.getElementById("modalidade");

m.innerHTML = `<option value="">Modalidade</option>`;

data.modalidade.forEach(x =>
    m.add(new Option(x, x))
);

// ====================================
// TOGGLE
// ====================================
window.toggleFormacao = async function(id) {

    try {

        let res = await fetch(
            `/api/formacoes/toggle/${id}`,
            {
                method: "PATCH"
            }
        );

        await res.json();

        mostrarMsg({
            message:
                "Status alterado com sucesso"
        });

        carregarTabela();

    } catch(err) {

        console.error(err);
    }
}

// ====================================
// LISTAR
// ====================================
async function carregarTabela() {

    try {

        let busca =
            document.getElementById("busca").value;

        let limite =
            document.getElementById("limite").value;

        let url =
            `/api/formacoes?busca=${busca}&pagina=${paginaFormacao}&limite=${limite}`;

        let res = await fetch(url);

        let data = await res.json();

        if (!data.dados)
            return;

        let html = `
        <table class="table table-striped table-sm">

            <thead>
                <tr>

                    <th>Descrição</th>
                    <th>Início</th>
                    <th>Término</th>                    
                    <th>Status</th>
                    <th>Ativa</th>
                    <th>Ações</th>

                </tr>
            </thead>

            <tbody>
        `;

        data.dados.forEach(f => {

            let ativo =
                f.ativo
                ? "🟢"
                : "🔴";

            let btnTexto =
                f.ativo
                ? "Desativar"
                : "Ativar";

            let btnClasse =
                f.ativo
                ? "btn-danger"
                : "btn-success";

            html += `
            <tr>

                <td>${f.descricao}</td>

                <td>${f.data_inicio || ""}</td>

                <td>${f.data_termino || ""}</td>                

                <td>${f.status || ""}</td>

                <td>${ativo}</td>

                <td>

                    <button
                        class="btn btn-sm btn-warning"
                        onclick='editar(${JSON.stringify(f)})'
                    >
                        ✏️
                    </button>

                    <button
                        class="btn btn-sm ${btnClasse}"
                        onclick="toggleFormacao(${f.id})"
                    >
                        ${btnTexto}
                    </button>

                </td>

            </tr>
            `;
        });

        html += `
            </tbody>
        </table>
        `;

        document.getElementById("tabela")
            .innerHTML = html;

        totalPaginas =
            data.total_paginas || 1;

        document.getElementById("pagina_info")
            .innerText =
            `Página ${paginaFormacao} de ${totalPaginas}`;

    } catch(err) {

        console.error(err);
    }
}

// ====================================
// PAGINAÇÃO
// ====================================
window.proxima = function() {

    if (paginaFormacao < totalPaginas) {

        paginaFormacao++;

        carregarTabela();
    }
}

window.anterior = function() {

    if (paginaFormacao > 1) {

        paginaFormacao--;

        carregarTabela();
    }
}

window.resetarPagina = function() {

    paginaFormacao = 1;

    carregarTabela();
}

// ====================================
// SALVAR
// ====================================
window.salvar = async function(event) {

    event.preventDefault();

    let dados = {

        descricao:
            document.getElementById("descricao")
            .value.trim(),

        data_inicio:
            document.getElementById("data_inicio")
            .value || null,

        data_termino:
            document.getElementById("data_termino")
            .value || null,

        carga_horaria:
            parseInt(
                document.getElementById("carga").value
            ) || 0,

        modalidade:
            document.getElementById("modalidade")
            .value,        

        periodo:
            document.getElementById("periodo")
            .value,

        publico_alvo:
            document.getElementById("publico_alvo")
            .value,

        investimento:
            parseFloat(
                document.getElementById("investimento")
                .value
            ) || 0,        

        meta_participantes:
            parseInt(
                document.getElementById("meta_participantes")
                .value
            ) || 0,
        status:
            document.getElementById("status")
            .value,        
    };

    if (!dados.descricao) {

        mostrarMsg({
            erro:
                "Informe a descrição"
        });

        return;
    }

    let url = "/api/formacao";

    let method = "POST";

    if (editandoId) {

        url =
            `/api/formacao/${editandoId}`;

        method = "PUT";
    }

    let res = await fetch(url, {

        method: method,

        headers: {
            "Content-Type":
                "application/json"
        },

        body: JSON.stringify(dados)
    });

    let r = await res.json();

    mostrarMsg(r);

    if (r.ok) {

        limpar();

        carregarTabela();
    }
}

// ====================================
// EDITAR
// ====================================
window.editar = function(f) {

    editandoId = f.id;

    document.getElementById("descricao")
        .value = f.descricao || "";

    document.getElementById("data_inicio")
        .value = f.data_inicio || "";

    document.getElementById("data_termino")
        .value = f.data_termino || "";

    document.getElementById("carga")
        .value = f.carga_horaria || "";

    document.getElementById("modalidade")
        .value = f.modalidade || "";    

    document.getElementById("periodo")
        .value = f.periodo || "";

    document.getElementById("publico_alvo")
        .value = f.publico_alvo || "";

    document.getElementById("investimento")
        .value = f.investimento || "";   

    document.getElementById("meta_participantes")
        .value = f.meta_participantes || "";    

    document.getElementById("status")
        .value = f.status || "Planejada";

    document.querySelector(".btn-primary")
        .innerText = "Atualizar";

    document.querySelector("h2")
        .innerHTML =
        `✏️ Editando Formação: ${f.descricao}`;

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}

// ====================================
// UI
// ====================================
function mostrarMsg(r) {

    let msg =
        document.getElementById("msg");

    if (r.erro) {

        msg.innerHTML = `
            <div class="alert alert-danger">
                ${r.erro}
            </div>
        `;

    } else {

        msg.innerHTML = `
            <div class="alert alert-success">
                ${r.message || "Operação realizada"}
            </div>
        `;
    }

    setTimeout(() => {

        msg.innerHTML = "";

    }, 2500);
}

function limpar() {

    editandoId = null;

    document.querySelector("form").reset();

    document.querySelector(".btn-primary")
        .innerText = "Salvar";

    document.querySelector("h2")
        .innerHTML =
        "📚 Cadastro de Formação";
}

// ====================================
// INIT
// ====================================
document.addEventListener(
    "DOMContentLoaded",
    () => {

        carregarEnums();

        carregarTabela();
    }
);

})();
</script>

{% endblock %}
