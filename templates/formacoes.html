{% extends "base.html" %}

{% block content %}

<h2>📚 Cadastro de Formação</h2>

<form onsubmit="salvar(event)">

    <!-- LINHA 1 -->
    <div class="row mb-3">

        <!-- LINHA 1 -->

<div class="col-md-4">
    <input type="text"
           id="descricao"
           class="form-control"
           placeholder="Descrição"
           required>
</div>

<div class="col-md-2">
    <input type="date"
           id="data_inicio"
           class="form-control"
           required>
</div>

<div class="col-md-2">
    <input type="date"
           id="data_termino"
           class="form-control"
           required>
</div>

<div class="col-md-2">
    <input type="number"
           id="carga"
           class="form-control"
           placeholder="Carga Horária"
           min="1"
           required>
</div>

    </div>


    
    <!-- LINHA 2 -->

<div class="col-md-3">

<select id="modalidade"
        class="form-select"
        required>

</select>

</div>

<div class="col-md-3">

<input type="text"
       id="periodo"
       class="form-control"
       placeholder="Período"
       required>

</div>

<div class="col-md-3">

<input type="text"
       id="publico_alvo"
       class="form-control"
       placeholder="Público-Alvo"
       required>

</div>

<div class="col-md-3">

<select id="plano_anual_id"
        class="form-select"
        required>

</select>

</div>


    
    <!-- LINHA 3 -->

<div class="col-md-3">

<input type="number"
       id="meta_participantes"
       class="form-control"
       placeholder="Meta Participantes"
       min="1"
       required>

</div>

<div class="col-md-3">

<input type="number"
       step="0.01"
       id="investimento"
       class="form-control"
       placeholder="Investimento"
       min="0"
       required>

</div>


    <!-- LINHA 4 -->
    <div class="row mb-3">

        <!-- LINHA 1 -->

<div class="col-md-4">
    <input type="text"
           id="descricao"
           class="form-control"
           placeholder="Descrição"
           required>
</div>

<div class="col-md-2">
    <input type="date"
           id="data_inicio"
           class="form-control"
           required>
</div>

<div class="col-md-2">
    <input type="date"
           id="data_termino"
           class="form-control"
           required>
</div>

<div class="col-md-2">
    <input type="number"
           id="carga"
           class="form-control"
           placeholder="Carga Horária"
           min="1"
           required>
</div>

    </div>

    <button class="btn btn-primary">
        Salvar
    </button>

</form>

<div id="msg" class="mt-2"></div>

<hr>


<div class="row mb-3">

    <div class="col-md-6">

        <input type="text"
               id="busca"
               class="form-control"
               placeholder="Buscar..."
               onkeyup="resetarPagina()">

    </div>

    <div class="col-md-2">

        <select id="limite"
                class="form-select"
                onchange="resetarPagina()">

            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>

        </select>

    </div>

</div>


<div id="tabela"></div>


<div class="d-flex justify-content-between mt-3">

    <button class="btn btn-secondary"
            onclick="anterior()">

        ⬅ Anterior

    </button>

    <span id="pagina_info"></span>

    <button class="btn btn-secondary"
            onclick="proxima()">

        Próximo ➡

    </button>

</div>


<style>

.table{
    font-size:0.82rem;
}

</style>


<script>

(() => {

let editandoId=null;
let paginaFormacao=1;
let totalPaginas=1;
let dadosTabela=[];


// =====================
// ENUMS
// =====================

async function carregarEnums(){

try{

    let res=
    await fetch("/api/enums");

    let data=
    await res.json();

    let m=
    document.getElementById(
        "modalidade"
    );

    m.innerHTML=
    `<option value="">
        Modalidade
    </option>`;

    data.modalidade.forEach(x=>{

        m.add(
            new Option(x,x)
        );

    });

}

catch(err){

    console.log(err);

}

}


// =====================
// PLANOS
// =====================

async function carregarPlanos(){

try{

    let res=
    await fetch(
        "/api/planos_anual"
    );

    let data=
    await res.json();

    let select=
    document.getElementById(
        "plano_anual_id"
    );

    select.innerHTML=
    `<option value="">
        Plano Anual
    </option>`;

    data.forEach(plano=>{

        select.add(

            new Option(
                `${plano.ano} | ${plano.eixo}`,
                plano.id
            )

        );

    });

}

catch(err){

console.log(err);

}

}


// =====================
// LISTAR
// =====================

async function carregarTabela(){

try{

let busca=
document.getElementById(
"busca"
).value;

let limite=
document.getElementById(
"limite"
).value;


let res=
await fetch(

`/api/formacoes?busca=${busca}&pagina=${paginaFormacao}&limite=${limite}`

);


let data=
await res.json();

dadosTabela=
data.dados;


let html=`

<table class="table table-striped table-sm">

<thead>

<tr>

<th>Descrição</th>
<th>Início</th>
<th>Término</th>
<th>Status</th>
<th>Ativa</th>
<th>Ações</th>

</tr>

</thead>

<tbody>

`;


dadosTabela.forEach(f=>{

let ativo=
f.ativo?"🟢":"🔴";

let texto=
f.ativo?"Desativar":"Ativar";

let classe=
f.ativo
?"btn-danger"
:"btn-success";


html+=`

<tr>

<td>${f.descricao}</td>
<td>${f.data_inicio||""}</td>
<td>${f.data_termino||""}</td>
<td>${f.status||""}</td>
<td>${ativo}</td>

<td>

<button
class="btn btn-warning btn-sm"
onclick="editar(${f.id})">

✏️

</button>


<button
class="btn ${classe} btn-sm"
onclick="toggleFormacao(${f.id})">

${texto}

</button>

</td>

</tr>

`;

});

html+=`
</tbody>
</table>
`;

document
.getElementById(
"tabela"
)
.innerHTML=html;


totalPaginas=
data.total_paginas||1;

document
.getElementById(
"pagina_info"
)
.innerText=

`Página ${paginaFormacao} de ${totalPaginas}`;


}catch(err){

console.log(err);

}

}


// =====================
// EDITAR
// =====================

window.editar=function(id){

let f=
dadosTabela.find(
x=>x.id==id
);

if(!f)return;


editandoId=f.id;

document.getElementById("descricao").value=f.descricao||"";
document.getElementById("data_inicio").value=f.data_inicio||"";
document.getElementById("data_termino").value=f.data_termino||"";
document.getElementById("carga").value=f.carga_horaria||"";
document.getElementById("modalidade").value=f.modalidade||"";
document.getElementById("periodo").value=f.periodo||"";
document.getElementById("publico_alvo").value=f.publico_alvo||"";
document.getElementById("investimento").value=f.investimento||"";
document.getElementById("meta_participantes").value=f.meta_participantes||"";
document.getElementById("status").value=f.status||"Planejada";
document.getElementById("plano_anual_id").value=f.plano_anual_id||"";

document.querySelector(
".btn-primary"
).innerText="Atualizar";

};


// =====================
// SALVAR
// =====================

window.salvar=async function(event){

event.preventDefault();

let dados={

descricao:descricao.value.trim(),
data_inicio:data_inicio.value||null,
data_termino:data_termino.value||null,
carga_horaria:parseInt(carga.value)||0,
modalidade:modalidade.value,
periodo:periodo.value,
publico_alvo:publico_alvo.value,
investimento:parseFloat(investimento.value)||0,
meta_participantes:parseInt(meta_participantes.value)||0,
status:status.value,
plano_anual_id:plano_anual_id.value||null

};


let url="/api/formacao";
let method="POST";

if(editandoId){

url=`/api/formacao/${editandoId}`;
method="PUT";

}

let res=
await fetch(url,{

method,
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(dados)

});

let r=
await res.json();

mostrarMsg(r);

if(r.ok){

limpar();
carregarTabela();

}

};


// =====================
// TOGGLE
// =====================

window.toggleFormacao=
async function(id){

await fetch(
`/api/formacoes/toggle/${id}`,
{
method:"PATCH"
}
);

carregarTabela();

}


// =====================
// UTIL
// =====================

window.proxima=()=>{

if(
paginaFormacao<
totalPaginas
){

paginaFormacao++;

carregarTabela();

}

};


window.anterior=()=>{

if(
paginaFormacao>1
){

paginaFormacao--;

carregarTabela();

}

};


window.resetarPagina=()=>{

paginaFormacao=1;

carregarTabela();

};


function limpar(){

editandoId=null;

document
.querySelector(
"form"
)
.reset();

document
.querySelector(
".btn-primary"
)
.innerText="Salvar";

}


function mostrarMsg(r){

let msg=
document.getElementById(
"msg"
);

msg.innerHTML=

r.erro

?`<div class="alert alert-danger">${r.erro}</div>`

:`<div class="alert alert-success">${r.message||"OK"}</div>`;


setTimeout(()=>{

msg.innerHTML="";

},2500);

}


document.addEventListener(
"DOMContentLoaded",
()=>{

carregarEnums();
carregarPlanos();
carregarTabela();

}
);

})();

</script>

{% endblock %}
