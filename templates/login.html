<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card p-4 shadow">

                <h4 class="text-center mb-3">Login</h4>

                <input id="username" class="form-control mb-2" placeholder="Usuário">
                <input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

                <button class="btn btn-primary w-100" onclick="login()">Entrar</button>

                <div id="msg" class="text-danger mt-2 text-center"></div>

            </div>

        </div>
    </div>

</div>

<script>
async function login() {

    const formData = new FormData();

    formData.append("username", document.getElementById("username").value);
    formData.append("senha", document.getElementById("senha").value);

    const res = await fetch("/login", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (data.ok) {

        // salva perfil do usuário
        localStorage.setItem("perfil", data.perfil);

        window.location.href = data.redirect;

    } else {

        document.getElementById("msg").innerText = data.erro;
    }
}
</script>

</body>
</html>
