<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width: 320px;">
    <h4 class="mb-3 text-center">🔐 Login</h4>

    <form onsubmit="login(event)">
        <input id="username" class="form-control mb-2" placeholder="Usuário" required>
        <input id="senha" type="password" class="form-control mb-3" placeholder="Senha" required>

        <button class="btn btn-primary w-100">Entrar</button>
    </form>

    <div id="msg" class="mt-2"></div>
</div>

<script>

async function login(e) {
    e.preventDefault();

    let username = document.getElementById("username").value.trim();
    let senha = document.getElementById("senha").value.trim();

    // 🔴 validação
    if (!username || !senha) {
        mostrarMsg("Preencha usuário e senha", "danger");
        return;
    }

    try {
        let res = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                senha: senha
            })
        });

        let r;

        try {
            r = await res.json();
        } catch {
            mostrarMsg("Erro inesperado no servidor", "danger");
            return;
        }

        // 🔴 erro de autenticação
        if (!res.ok || !r.token) {
            mostrarMsg(r.erro || "Usuário ou senha inválidos", "danger");
            return;
        }

        // ✅ limpa sessão anterior
        localStorage.clear();

        // ✅ salva dados
        localStorage.setItem("token", r.token);
        localStorage.setItem("perfil", r.perfil);

        mostrarMsg("Login realizado com sucesso", "success");

        // 🚀 redireciona
        setTimeout(() => {
            window.location.href = "/web/dashboard";
        }, 800);

    } catch (err) {
        console.error(err);
        mostrarMsg("Erro de conexão com o servidor", "danger");
    }
}

// =====================
// UI
// =====================
function mostrarMsg(texto, tipo) {
    document.getElementById("msg").innerHTML =
        `<div class="alert alert-${tipo}">${texto}</div>`;
}

</script>

</body>
</html>
