{% extends "base.html" %}

{% block content %}

<h2>🏢 Cadastro de Lotação</h2>

<form onsubmit="salvar(event)">
    <div class="row mb-3">

        <div class="col-md-6">
            <input type="text" id="descricao" class="form-control" placeholder="Descrição" required>
        </div>

        <div class="col-md-4">
            <input type="text" id="tipo" class="form-control" placeholder="Tipo (Ex: Coordenação)" required>
        </div>

    </div>

    <button class="btn btn-primary">Salvar</button>
</form>

<div id="msg" class="mt-2"></div>

<hr>

<input type="text"
       id="busca"
       class="form-control mb-3"
       placeholder="Buscar por descrição ou tipo..."
       onkeyup="carregarTabela()">

<div id="tabela"></div>

<script>

let editando = null;
let listaLotacoes = [];

// =====================
// LISTAR LOTAÇÕES
// =====================
async function carregarTabela() {
    try {
        let res = await api("/api/lotacoes");
        let data = await res.json();

        if (!res.ok) {
            mostrarMsg({erro: data.erro || "Erro ao carregar lotações"});
            return;
        }

        listaLotacoes = data;

        let busca = document.getElementById("busca").value.toLowerCase();

        let filtrado = data.filter(l =>
            l.descricao.toLowerCase().includes(busca) ||
            l.tipo.toLowerCase().includes(busca)
        );

        let html = `
        <table class="table table-striped">
            <tr>
                <th>Descrição</th>
                <th>Tipo</th>
                <th>Ações</th>
            </tr>
        `;

        filtrado.forEach((l, i) => {
            html += `
            <tr>
                <td>${l.descricao}</td>
                <td>${l.tipo}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="editar(${i})">✏️</button>
                </td>
            </tr>
            `;
        });

        html += "</table>";

        document.getElementById("tabela").innerHTML = html;

    } catch (err) {
        mostrarMsg({erro: "Erro de conexão ao carregar lotações"});
        console.error(err);
    }
}


// =====================
// SALVAR (CRIAR / EDITAR)
// =====================
async function salvar(e) {
    e.preventDefault();

    let dados = {
        descricao: document.getElementById("descricao").value,
        tipo: document.getElementById("tipo").value
    };

    let url = "/api/lotacoes";
    let method = "POST";

    if (editando) {
        url = `/api/lotacoes/${editando}`;
        method = "PUT";
    }

    try {
        let res = await api(url, {
            method: method,
            body: JSON.stringify(dados)
        });

        let r = await res.json();

        if (!res.ok) {
            mostrarMsg({erro: r.erro || "Erro ao salvar"});
            return;
        }

        mostrarMsg({ok: true});

        limpar();
        carregarTabela();

    } catch (err) {
        mostrarMsg({erro: "Falha de conexão com o servidor"});
        console.error(err);
    }
}


// =====================
// EDITAR
// =====================
function editar(index) {
    limpar();

    let l = listaLotacoes[index];

    editando = l.id;

    document.getElementById("descricao").value = l.descricao;
    document.getElementById("tipo").value = l.tipo;

    document.querySelector("button.btn-primary").innerText = "Atualizar";

    document.getElementById("descricao").focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}


// =====================
// LIMPAR FORM
// =====================
function limpar() {
    editando = null;
    document.querySelector("form").reset();
    document.querySelector("button.btn-primary").innerText = "Salvar";
}


// =====================
// MENSAGEM
// =====================
function mostrarMsg(r) {
    let msg = document.getElementById("msg");

    if (r.erro) {
        msg.innerHTML = `<div class="alert alert-danger">${r.erro}</div>`;
    } else {
        msg.innerHTML = `<div class="alert alert-success">Operação realizada com sucesso</div>`;
    }
}


// =====================
// INIT
// =====================
carregarTabela();

</script>

{% endblock %}
