{% extends "base.html" %}

{% block content %}

<h2>📊 Participação em Formação</h2>

<!-- ===================== -->
<!-- FORMAÇÃO -->
<!-- ===================== -->
<div class="row mb-3">
    <div class="col-md-6">
        <label><b>Formação</b></label>
        <select id="formacao" class="form-select" onchange="trocarFormacao()" required></select>
    </div>
</div>

<hr>

<!-- ===================== -->
<!-- FORM -->
<!-- ===================== -->
<h5>Adicionar Servidor</h5>

<form onsubmit="salvar(event)">
    <div class="row mb-3">

        <!-- MATRÍCULA + SERVIDOR -->
        <div class="col-md-4">

            <input type="text"
                   id="matricula"
                   class="form-control mb-2"
                   placeholder="Digite a matrícula">
            <input type="hidden" id="servidor">
            <div id="nome_servidor"
                 class="text-primary small mb-2">
            </div>

        </div>

        <!-- LOTAÇÃO -->
        <div class="col-md-4">

            <input
                type="text"
                id="lotacao_busca"
                class="form-control"
                placeholder="Digite a lotação"
                list="lista_lotacoes"
                autocomplete="off"
                required
            >

            <datalist id="lista_lotacoes"></datalist>

            <input type="hidden" id="lotacao">

        </div>

        <!-- APROVEITAMENTO -->
        <div class="col-md-4">
            <input type="number"
               id="aproveitamento"
               class="form-control"
               placeholder="Aproveitamento"
               min="0"
               step="0.5"
               required>
        </div>

    </div>

    <button class="btn btn-primary">Adicionar</button>
</form>

<div id="msg" class="mt-2"></div>

<hr>

<!-- ===================== -->
<!-- LISTA -->
<!-- ===================== -->
<h5>Servidores na Formação</h5>

<input type="text" id="busca" class="form-control mb-3" placeholder="Buscar..." onkeyup="carregarTabela()">

<div id="tabela"></div>

<style>
.table{
    font-size: 0.82rem;
}
</style>

<script>

let formacaoAtual = null;
let timeoutMatricula = null;

// =====================
// AUTOCOMPLETE MATRÍCULA
// =====================
const inputMatricula = document.getElementById("matricula");

if (inputMatricula) {
    inputMatricula.addEventListener("input", function () {

        clearTimeout(timeoutMatricula);

        let matricula = this.value.trim();
        if (!matricula) return;

        timeoutMatricula = setTimeout(async () => {
            try {

                let res = await api(`/api/servidores/matricula/${matricula}`);
                let data = await res.json();

                const nomeEl = document.getElementById("nome_servidor");

                if (!nomeEl) return;

                if (data && data.matricula) {
                    document.getElementById("servidor").value = data.matricula;
                    nomeEl.innerHTML =`
                    👤 ${data.nome}<br>
                    Matrícula: ${data.matricula}`;

                    } else {                    
                        document.getElementById("servidor").value = "";                    
                        nomeEl.innerHTML =`
                            <span class="text-danger">
                                Servidor não encontrado
                            </span>`;
                    }

            } catch (err) {
                console.error(err);
            }
        }, 400);
    });
}

// =====================
// FORMAÇÕES
// =====================
async function carregarFormacoes() {

    try {

        let res = await api("/api/formacoes/ativas");
        let data = await res.json();

        if (!res.ok) {
            return mostrarMsg({
                erro: data.erro || "Erro ao carregar formações"
            });
        }

        let select = document.getElementById("formacao");
        if (!select) return;

        select.innerHTML = `<option value="">Selecione a formação</option>`;

        (data || []).forEach(f => {
            select.add(new Option(f.descricao, f.id));
        });

        if (data?.length > 0) {
            formacaoAtual = data[0].id;
            select.value = formacaoAtual;
            carregarTabela();
        }

    } catch (err) {
        console.error(err);
        mostrarMsg({ erro: "Erro de conexão (formações)" });
    }
}


// =====================
// LOTAÇÃO (AUTOCOMPLETE DINÂMICO)
// =====================
const inputLotacao = document.getElementById("lotacao_busca");

if (inputLotacao) {

    inputLotacao.addEventListener("input", async function () {

        let termo = this.value.trim();

        document.getElementById("lotacao").value = "";

        if (termo.length < 3) return;

        try {

            let res = await api(`/api/lotacoes?termo=${encodeURIComponent(termo)}`);
            let data = await res.json();

            let lista = document.getElementById("lista_lotacoes");
            lista.innerHTML = "";

            (data || []).forEach(l => {

                let option = document.createElement("option");
                option.value = l.descricao;
                lista.appendChild(option);
            });

            let encontrada = (data || []).find(l =>
                l.descricao.toLowerCase() === termo.toLowerCase()
            );

            if (encontrada) {
                document.getElementById("lotacao").value = encontrada.id;
            }

        } catch (err) {
            console.error(err);
        }
    });

    inputLotacao.addEventListener("change", async function () {

        let termo = this.value.trim();

        if (!termo) return;

        try {

            let res = await api(`/api/lotacoes?termo=${encodeURIComponent(termo)}`);
            let data = await res.json();

            let encontrada = (data || []).find(l =>
                l.descricao.toLowerCase() === termo.toLowerCase()
            );

            if (encontrada) {
                document.getElementById("lotacao").value = encontrada.id;
            }

        } catch (err) {
            console.error(err);
        }
    });
}

// =====================
// TROCAR FORMAÇÃO
// =====================
function trocarFormacao() {
    formacaoAtual = document.getElementById("formacao")?.value;
    limpar();
    carregarTabela();
}

// =====================
// TABELA
// =====================
async function carregarTabela() {

    if (!formacaoAtual) return;

    try {

        let res = await api(`/api/participacoes/${formacaoAtual}`);
        let data = await res.json();

        if (!res.ok) {
            return mostrarMsg({
                erro: data.erro || "Erro ao carregar lista"
            });
        }

        let busca = (document.getElementById("busca")?.value || "").toLowerCase();

        let html = `
        <table class="table table-striped">
            <tr>
                <th>Matrícula</th>
                <th>Nome</th>
                <th>Lotação</th>
                <th>Aproveitamento</th>
                <th>Ações</th>
            </tr>
        `;

        (data || [])
        .filter(p =>
            (p.nome || "").toLowerCase().includes(busca) ||
            (p.matricula || "").includes(busca)
        )
        .forEach(p => {
            html += `
            <tr>
                <td>${p.matricula}</td>
                <td>${p.nome}</td>
                <td>${p.lotacao || ""}</td>
                <td>${p.aproveitamento}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="deletar(${p.id})">🗑</button>
                </td>
            </tr>
            `;
        });

        html += "</table>";

        const tabela = document.getElementById("tabela");
        if (tabela) tabela.innerHTML = html;

    } catch (err) {
        console.error(err);
        mostrarMsg({ erro: "Erro de conexão (tabela)" });
    }
}

// =====================
// SALVAR
// =====================
async function salvar(e) {

    e.preventDefault();

    let matricula = document.getElementById("servidor")?.value;
    let lotacao = document.getElementById("lotacao")?.value;
    let aproveitamento = document.getElementById("aproveitamento").max = cargaHorariaFormacao;

    if (!formacaoAtual)
        return mostrarMsg({ erro: "Selecione uma formação" });

    if (!matricula)
        return mostrarMsg({ erro: "Selecione um servidor" });

    if (!lotacao)
        return mostrarMsg({ erro: "Selecione a lotação" });

    if (!aproveitamento)
        return mostrarMsg({ erro: "Informe o aproveitamento" });

    let dados = {
        matricula,
        lotacao_id: parseInt(lotacao),
        aproveitamento,
        formacao_id: formacaoAtual
    };

    try {

        let res = await api("/api/participacoes", {
            method: "POST",
            body: JSON.stringify(dados)
        });

        let r = await res.json();

        if (!res.ok) {
            return mostrarMsg({ erro: r.erro || "Erro ao salvar" });
        }

        mostrarMsg(r);

        if (r.ok) {
            limpar();
            carregarTabela();
        }

    } catch (err) {
        console.error(err);
        mostrarMsg({ erro: "Erro de conexão ao salvar" });
    }
}

// =====================
// DELETAR
// =====================
async function deletar(id) {

    if (!confirm("Remover servidor desta formação?")) return;

    try {

        let res = await api(`/api/participacoes/${id}`, {
            method: "DELETE"
        });

        let r = await res.json();

        if (!res.ok) {
            return mostrarMsg({ erro: r.erro || "Erro ao deletar" });
        }

        if (r.ok) carregarTabela();

    } catch (err) {
        console.error(err);
        mostrarMsg({ erro: "Erro de conexão ao deletar" });
    }
}
// =====================
// MENSAGENS (FIX)
// =====================
function mostrarMsg(r) {

    let msg = document.getElementById("msg");
    if (!msg) return;

    if (r.erro) {
        msg.innerHTML = `<div class="alert alert-danger">${r.erro}</div>`;
    } else {
        msg.innerHTML = `<div class="alert alert-success">${r.ok ? "Sucesso" : "OK"}</div>`;
    }

    setTimeout(() => msg.innerHTML = "", 2500);
}

// =====================
// LIMPAR
// =====================
function limpar() {

    document.getElementById("matricula").value = "";
    document.getElementById("servidor").value = "";
    document.getElementById("nome_servidor").innerHTML = "";
    document.getElementById("aproveitamento").value = "";
    document.getElementById("lotacao").value = "";
    document.getElementById("lotacao_busca").value = "";
}

// =====================
// INIT
// =====================
carregarFormacoes();


</script>

{% endblock %}
