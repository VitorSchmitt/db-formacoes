{% extends "base.html" %}

{% block content %}

<h2>📋 Relatório Servidor</h2>

<div class="card shadow-sm mb-4">

    <div class="card-body">

        <div class="row">

            <div class="col-md-4">

                <label class="form-label">

                    Matrícula

                </label>

                <input
                    id="matricula"
                    type="text"
                    class="form-control"
                    placeholder="Digite a matrícula">

            </div>

            <div class="col-md-2 d-flex align-items-end">

                <button
                    class="btn btn-primary w-100"
                    onclick="buscar()">

                    🔍 Buscar

                </button>

            </div>

            <div class="col-md-2 d-flex align-items-end">

                <button
                    class="btn btn-danger w-100"
                    onclick="gerarPDF()">

                    📄 PDF

                </button>

            </div>

        </div>

    </div>

</div>


<div class="card shadow-sm">

    <div class="card-body">

        <div class="row mb-3">

            <div class="col-md-6">

                <h5 id="nomeServidor">

                    Servidor:

                </h5>

            </div>

            <div class="col-md-3">

                <h6 id="matriculaServidor">

                    Matrícula:

                </h6>

            </div>

            <div class="col-md-3">

                <h6 id="totalHoras">

                    Total Horas: 0

                </h6>

            </div>

        </div>

        <div class="table-responsive">

            <table
                class="table table-striped table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>Formação</th>                        
                        <th>Carga Horária</th>                        
                        <th>Data Fim</th>

                    </tr>

                </thead>

                <tbody id="resultado">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

async function buscar(){

    let matricula =
        document.getElementById(
            "matricula"
        ).value.trim();

    if(!matricula){

        alert(
            "Informe a matrícula"
        );

        return;
    }

    let resposta =
        await fetch(
            `/api/relatorio-servidor?matricula=${encodeURIComponent(matricula)}`
        );

    let dados =
        await resposta.json();

    document.getElementById(
        "nomeServidor"
    ).innerText =
        "Servidor: " +
        (dados.servidor || "-");

    document.getElementById(
        "matriculaServidor"
    ).innerText =
        "Matrícula: " +
        (dados.matricula || "-");

    document.getElementById(
        "totalHoras"
    ).innerText =
        "Total Horas: " +
        (dados.total_horas || 0);

    let html = "";

    if(
        !dados.formacoes ||
        dados.formacoes.length == 0
    ){

        html = `
        <tr>
            <td colspan="5"
                class="text-center">

                Nenhuma formação encontrada

            </td>
        </tr>
        `;
    }

    else{

        dados.formacoes.forEach(
            x => {

                html += `
                <tr>

                    <td>${x.formacao}</td>                    

                    <td>
                        ${x.carga_horaria}
                    </td>
                    <td>
                        ${x.data_fim}
                    </td>

                </tr>
                `;
            }
        );

    }

    document.getElementById(
        "resultado"
    ).innerHTML = html;

}


function gerarPDF(){

    let matricula =
        document.getElementById(
            "matricula"
        ).value.trim();

    if(!matricula){

        alert(
            "Informe a matrícula"
        );

        return;
    }

    window.open(
        `/api/relatorio-servidor/pdf?matricula=${encodeURIComponent(matricula)}`
    );

}

</script>

{% endblock %}
