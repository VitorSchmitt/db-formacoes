{% extends "base.html" %}

{% block content %}

<h2>👥 Cadastro de Servidores</h2>

<form onsubmit="salvar(event)">
    <div class="row mb-3">
        <div class="col-md-3">
            <input type="text" id="matricula" class="form-control" placeholder="Matrícula" required>
        </div>

        <div class="col-md-5">
            <input type="text" id="nome" class="form-control" placeholder="Nome" required>
        </div>

        <div class="col-md-4">
            <select id="cargo" class="form-select" required></select>
        </div>
    </div>

    <button class="btn btn-primary">Salvar</button>
</form>

<div id="msg" class="mt-2"></div>

<hr>

<input type="text" id="busca" class="form-control mb-3" placeholder="Buscar..." onkeyup="carregarTabela()">

<div id="tabela"></div>

<script>

let editando = null;
let listaServidores = [];

// =====================
// CARGOS
// =====================
async function carregarCargos() {
    try {
        let res = await api("/api/cargos");
        let data = await res.json();

        if (!res.ok) {
            mostrarMsg({erro: data.erro || "Erro ao carregar cargos"});
            return;
        }

        let select = document.getElementById("cargo");
        select.innerHTML = `<option value="">Selecione o cargo</option>`;

        data.forEach(c => {
            select.add(new Option(c.descricao, c.id));
        });

    } catch (err) {
        mostrarMsg({erro: "Erro de conexão ao carregar cargos"});
        console.error(err);
    }
}

// =====================
// LISTAR
// =====================
async function carregarTabela() {
    try {
        let res = await api("/api/servidores");
        let data = await res.json();

        if (!res.ok) {
            mostrarMsg({erro: data.erro || "Erro ao carregar servidores"});
            return;
        }

        listaServidores = data;

        let busca = document.getElementById("busca").value.toLowerCase();

        let html = `
        <table class="table table-striped">
            <tr>
                <th>Matrícula</th>
                <th>Nome</th>
                <th>Cargo</th>
                <th>Ações</th>
            </tr>
        `;

        data
        .filter(s => s.nome.toLowerCase().includes(busca))
        .forEach((s, i) => {
            html += `
            <tr>
                <td>${s.matricula}</td>
                <td>${s.nome}</td>
                <td>${s.cargo || ""}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="editar(${i})">✏️</button>
                </td>
            </tr>
            `;
        });

        html += "</table>";

        document.getElementById("tabela").innerHTML = html;

    } catch (err) {
        mostrarMsg({erro: "Erro de conexão ao carregar tabela"});
        console.error(err);
    }
}

// =====================
// SALVAR
// =====================
async function salvar(e) {
    e.preventDefault();

    let cargoValue = document.getElementById("cargo").value;

    if (!cargoValue) {
        mostrarMsg({erro: "Selecione um cargo"});
        return;
    }

    let dados = {
        matricula: document.getElementById("matricula").value,
        nome: document.getElementById("nome").value,
        cargo_id: parseInt(cargoValue)
    };

    let url = "/api/servidor";
    let method = "POST";

    if (editando) {
        url = `/api/servidor/${editando}`;
        method = "PUT";
    }

    try {
        let res = await api(url, {
            method: method,
            body: JSON.stringify(dados)
        });

        let r = await res.json();

        if (!res.ok) {
            mostrarMsg({erro: r.erro || "Erro ao salvar"});
            return;
        }

        mostrarMsg(r);

        if (r.ok) {
            limpar();
            carregarTabela();
        }

    } catch (err) {
        mostrarMsg({erro: "Falha de conexão com o servidor"});
        console.error(err);
    }
}

// =====================
// EDITAR
// =====================
function editar(index) {
    limpar();

    let s = listaServidores[index];

    editando = s.matricula;

    document.getElementById("matricula").value = s.matricula;
    document.getElementById("nome").value = s.nome;
    document.getElementById("cargo").value = s.cargo_id;

    document.getElementById("matricula").disabled = true;

    document.querySelector("button.btn-primary").innerText = "Atualizar";

    document.getElementById("nome").focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =====================
// UI
// =====================
function mostrarMsg(r) {
    let msg = document.getElementById("msg");

    if (r.erro) {
        msg.innerHTML = `<div class="alert alert-danger">${r.erro}</div>`;
    } else {
        msg.innerHTML = `<div class="alert alert-success">Sucesso</div>`;
    }
}

function limpar() {
    editando = null;
    document.querySelector("form").reset();
    document.getElementById("matricula").disabled = false;
    document.querySelector("button.btn-primary").innerText = "Salvar";
}

// =====================
// INIT
// =====================
carregarCargos();
carregarTabela();

</script>

{% endblock %}
