{% extends "base.html" %}

{% block content %}

<h2>👥 Cadastro de Servidores</h2>

<form onsubmit="salvar(event)">
    
    <div class="row mb-3">

        <div class="col-md-2">
            <input type="text"
                   id="matricula"
                   class="form-control"
                   placeholder="Matrícula"
                   required>
        </div>

        <div class="col-md-5">
            <input type="text"
                   id="nome"
                   class="form-control"
                   placeholder="Nome"
                   required>
        </div>

        <div class="col-md-3">
            <select id="cargo"
                    class="form-select"
                    required>
            </select>
        </div>

        <div class="col-md-2 d-grid">
            <button class="btn btn-primary">
                Salvar
            </button>
        </div>

    </div>

</form>

<div id="msg" class="mt-2"></div>

<hr>

<input type="text"
       id="busca"
       class="form-control mb-3"
       placeholder="Buscar servidor..."
       onkeyup="carregarTabela()">

<div id="tabela"></div>

<script>

let editando = null;
let listaServidores = [];


// =====================================================
// API
// =====================================================
async function api(url, options = {}) {

    options.headers = {
        "Content-Type": "application/json"
    };

    return fetch(url, options);
}


// =====================================================
// CARGOS
// =====================================================
async function carregarCargos() {

    try {

        let res = await api("/api/servidores/cargos");
        let data = await res.json();

        let select = document.getElementById("cargo");

        select.innerHTML = `
            <option value="">
                Selecione o cargo
            </option>
        `;

        data.forEach(c => {

            select.innerHTML += `
                <option value="${c.id}">
                    ${c.descricao}
                </option>
            `;
        });

    } catch (err) {

        mostrarMsg({
            erro: "Erro ao carregar cargos"
        });

        console.error(err);
    }
}


// =====================================================
// LISTAR
// =====================================================
async function carregarTabela() {

    try {

        let res = await api("/api/servidores");
        let data = await res.json();

        listaServidores = data;

        let busca = document
            .getElementById("busca")
            .value
            .toLowerCase();

        let html = `
        <table class="table table-striped table-hover align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Matrícula</th>
                    <th>Nome</th>
                    <th>Cargo</th>
                    <th>Status</th>
                    <th width="180">Ações</th>
                </tr>
            </thead>

            <tbody>
        `;

        data
        .filter(s =>
            s.nome.toLowerCase().includes(busca) ||
            s.matricula.toLowerCase().includes(busca)
        )
        .forEach((s, i) => {

            let status = s.ativo
                ? "🟢 Ativo"
                : "🔴 Inativo";

            let btnTexto = s.ativo
                ? "Desativar"
                : "Ativar";

            let btnClasse = s.ativo
                ? "btn-danger"
                : "btn-success";

            html += `
            <tr>

                <td>${s.matricula}</td>

                <td>${s.nome}</td>

                <td>${s.cargo || ""}</td>

                <td>${status}</td>

                <td>

                    <button class="btn btn-warning btn-sm"
                            onclick="editar(${i})">

                        ✏️
                    </button>

                    <button class="btn ${btnClasse} btn-sm"
                            onclick="toggleServidor('${s.matricula}')">

                        ${btnTexto}
                    </button>

                </td>

            </tr>
            `;
        });

        html += `
            </tbody>
        </table>
        `;

        document.getElementById("tabela").innerHTML = html;

    } catch (err) {

        mostrarMsg({
            erro: "Erro ao carregar servidores"
        });

        console.error(err);
    }
}


// =====================================================
// SALVAR
// =====================================================
async function salvar(e) {

    e.preventDefault();

    let cargo = document.getElementById("cargo").value;

    if (!cargo) {

        mostrarMsg({
            erro: "Selecione um cargo"
        });

        return;
    }

    let dados = {

        matricula: document.getElementById("matricula").value,

        nome: document.getElementById("nome").value,

        cargo_id: parseInt(cargo)
    };

    let url = "/api/servidores";
    let method = "POST";

    if (editando) {

        url = `/api/servidores/${editando}`;
        method = "PUT";
    }

    try {

        let res = await api(url, {
            method: method,
            body: JSON.stringify(dados)
        });

        let r = await res.json();

        mostrarMsg(r);

        if (r.ok) {

            limpar();

            carregarTabela();
        }

    } catch (err) {

        mostrarMsg({
            erro: "Erro ao salvar servidor"
        });

        console.error(err);
    }
}


// =====================================================
// EDITAR
// =====================================================
function editar(index) {

    limpar();

    let s = listaServidores[index];

    editando = s.matricula;

    document.getElementById("matricula").value = s.matricula;
    document.getElementById("nome").value = s.nome;
    document.getElementById("cargo").value = s.cargo_id;

    document.getElementById("matricula").disabled = true;

    document.querySelector(".btn-primary").innerText = "Atualizar";

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}


// =====================================================
// TOGGLE ATIVO / INATIVO
// =====================================================
async function toggleServidor(matricula) {

    try {

        let res = await api(
            `/api/servidores/toggle/${matricula}`,
            {
                method: "PATCH"
            }
        );

        let r = await res.json();

        mostrarMsg(r);

        carregarTabela();

    } catch (err) {

        mostrarMsg({
            erro: "Erro ao alterar status"
        });

        console.error(err);
    }
}


// =====================================================
// UI
// =====================================================
function mostrarMsg(r) {

    let msg = document.getElementById("msg");

    if (r.erro) {

        msg.innerHTML = `
            <div class="alert alert-danger">
                ${r.erro}
            </div>
        `;

    } else {

        msg.innerHTML = `
            <div class="alert alert-success">
                Operação realizada com sucesso
            </div>
        `;
    }
}


function limpar() {

    editando = null;

    document.querySelector("form").reset();

    document.getElementById("matricula").disabled = false;

    document.querySelector(".btn-primary").innerText = "Salvar";
}


// =====================================================
// INIT
// =====================================================
carregarCargos();
carregarTabela();

</script>

{% endblock %}
