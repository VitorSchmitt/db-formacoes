{% extends "base.html" %}

{% block content %}

<h2>👤 Cadastro de Usuários</h2>

<form onsubmit="salvar(event)">
    <div class="row mb-3">

        <div class="col-md-3">
            <input type="text" id="username" class="form-control" placeholder="Usuário" required>
        </div>

        <div class="col-md-3">
            <input type="password" id="senha" class="form-control" placeholder="Senha" required>
        </div>

        <div class="col-md-3">
            <select id="perfil" class="form-select" required>
                <option value="">Perfil</option>
                <option value="admin">Admin</option>
                <option value="operador">Operador</option>
                <option value="custom">Custom</option>
            </select>
        </div>

        <div class="col-md-3">
            <button class="btn btn-primary w-100">Salvar</button>
        </div>

    </div>
</form>

<div id="msg"></div>

<hr>

<input type="text" id="busca" class="form-control mb-3" placeholder="Buscar usuário..." onkeyup="carregarTabela()">

<div id="tabela"></div>

<script>

let editando = null;

// =====================
// LISTAR
// =====================
async function carregarTabela() {

    let res = await fetch("/api/usuarios");
    let data = await res.json();

    let busca = document.getElementById("busca").value.toLowerCase();

    let html = `
    <table class="table table-striped">
        <tr>
            <th>Usuário</th>
            <th>Perfil</th>
            <th>Ações</th>
        </tr>
    `;

    data
    .filter(u => u.username.toLowerCase().includes(busca))
    .forEach(u => {
        html += `
        <tr>
            <td>${u.username}</td>
            <td>${u.perfil}</td>
            <td>
                <button class="btn btn-warning btn-sm" onclick='editar(${JSON.stringify(u)})'>✏️</button>
                <button class="btn btn-danger btn-sm" onclick='deletar(${u.id})'>🗑</button>
            </td>
        </tr>
        `;
    });

    html += "</table>";

    document.getElementById("tabela").innerHTML = html;
}

// =====================
// SALVAR
// =====================
async function salvar(e) {
    e.preventDefault();

    let dados = {
        username: document.getElementById("username").value,
        senha: document.getElementById("senha").value,
        perfil: document.getElementById("perfil").value
    };

    let url = "/api/usuario";
    let method = "POST";

    if (editando) {
        url = `/api/usuario/${editando}`;
        method = "PUT";
    }

    let res = await fetch(url, {
        method: method,
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(dados)
    });

    let r = await res.json();

    mostrarMsg(r);

    if (r.ok) {
        limpar();
        carregarTabela();
    }
}

// =====================
// EDITAR
// =====================
function editar(u) {
    editando = u.id;

    document.getElementById("username").value = u.username;
    document.getElementById("perfil").value = u.perfil;

    // senha não volta (segurança)
}

# =====================
# DELETAR
# =====================
async function deletar(id) {

    if (!confirm("Excluir usuário?")) return;

    let res = await fetch(`/api/usuario/${id}`, {
        method: "DELETE"
    });

    let r = await res.json();

    mostrarMsg(r);

    if (r.ok) carregarTabela();
}

// =====================
// UI
// =====================
function mostrarMsg(r) {
    let msg = document.getElementById("msg");

    if (r.erro) {
        msg.innerHTML = `<div class="alert alert-danger">${r.erro}</div>`;
    } else {
        msg.innerHTML = `<div class="alert alert-success">Sucesso</div>`;
    }
}

function limpar() {
    editando = null;
    document.querySelector("form").reset();
}

# =====================
# INIT
# =====================
carregarTabela();

</script>

{% endblock %}
